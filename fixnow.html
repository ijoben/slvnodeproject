<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fix Referrals</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
</head>
<body style="background:#0a1228;color:#fff;font-family:Arial;padding:20px;">
    <h1 style="color:#fbbf24;">🔧 Fix Referrals</h1>
    
    <div style="margin:10px 0;">
        <button onclick="testConnection()" style="padding:10px 20px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer;">Test Connection</button>
        <button onclick="scanUsers()" style="padding:10px 20px;background:#22c55e;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer;">Scan Users</button>
        <button onclick="fixAll()" style="padding:10px 20px;background:#d97706;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer;">Fix All</button>
        <button onclick="forceFix()" style="padding:10px 20px;background:#ef4444;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer;">Force Fix</button>
    </div>

    <div style="background:rgba(0,0,0,0.5);border-radius:8px;padding:10px;margin:10px 0;max-height:300px;overflow-y:auto;font-family:monospace;font-size:12px;" id="logBox">
        <div style="color:#60a5fa;">Ready. Click "Test Connection"</div>
    </div>

    <div id="resultBox" style="margin:10px 0;"></div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        let supabase = null;
        let allUsers = [];

        // ============================================================
        // LOG FUNCTION
        // ============================================================
        function log(msg, type = 'info') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            const colors = {
                success: '#22c55e',
                error: '#ef4444',
                info: '#60a5fa',
                warning: '#fbbf24'
            };
            entry.style.color = colors[type] || '#fff';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[${type}]`, msg);
        }

        function showResult(html) {
            document.getElementById('resultBox').innerHTML = html;
        }

        // ============================================================
        // TEST CONNECTION
        // ============================================================
        async function testConnection() {
            log('Testing connection...', 'info');

            try {
                // Cek apakah Supabase SDK terload
                if (typeof window.supabase === 'undefined') {
                    throw new Error('Supabase SDK not loaded! Check internet.');
                }

                // Buat client
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log('✅ Client created', 'success');

                // Test query
                const { data, error } = await supabase
                    .from('users')
                    .select('count')
                    .limit(1);

                if (error) throw error;

                log('✅ Connected to Supabase!', 'success');

                // Tampilkan data sample
                const { data: sample, error: sampleError } = await supabase
                    .from('users')
                    .select('email, ref_code, referred_by')
                    .limit(5);

                if (!sampleError && sample) {
                    log(`📊 Sample data: ${sample.length} users`, 'info');
                    let html = '<h3>Sample Users:</h3><table style="width:100%;border-collapse:collapse;font-size:12px;">';
                    html += '<tr><th style="text-align:left;padding:5px;border-bottom:1px solid #333;">Email</th><th style="text-align:left;padding:5px;border-bottom:1px solid #333;">Ref Code</th><th style="text-align:left;padding:5px;border-bottom:1px solid #333;">Referred By</th></tr>';
                    sample.forEach(u => {
                        html += `<tr>
                            <td style="padding:5px;border-bottom:1px solid #222;">${u.email}</td>
                            <td style="padding:5px;border-bottom:1px solid #222;">${u.ref_code || '-'}</td>
                            <td style="padding:5px;border-bottom:1px solid #222;">${u.referred_by || 'NULL'}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    showResult(html);
                }

            } catch (err) {
                log('❌ Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        // ============================================================
        // SCAN USERS
        // ============================================================
        async function scanUsers() {
            if (!supabase) {
                log('⚠️ Click "Test Connection" first!', 'warning');
                return;
            }

            log('Scanning all users...', 'info');

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .order('email');

                if (error) throw error;

                allUsers = data || [];
                log(`✅ Found ${allUsers.length} users`, 'success');

                const nullRef = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
                log(`📊 ${nullRef.length} users have NULL referred_by`, 'warning');

                // Tampilkan semua user
                let html = `<h3>All Users (${allUsers.length}):</h3>`;
                html += `<table style="width:100%;border-collapse:collapse;font-size:12px;">
                    <tr>
                        <th style="text-align:left;padding:5px;border-bottom:2px solid #333;">#</th>
                        <th style="text-align:left;padding:5px;border-bottom:2px solid #333;">Email</th>
                        <th style="text-align:left;padding:5px;border-bottom:2px solid #333;">Ref Code</th>
                        <th style="text-align:left;padding:5px;border-bottom:2px solid #333;">Referred By</th>
                        <th style="text-align:left;padding:5px;border-bottom:2px solid #333;">Status</th>
                    </tr>`;

                allUsers.forEach((u, i) => {
                    const hasRef = u.referred_by && u.referred_by !== '' && u.referred_by !== 'null';
                    const status = hasRef ? '✅ OK' : '❌ NULL';
                    const color = hasRef ? '#22c55e' : '#ef4444';
                    html += `<tr>
                        <td style="padding:5px;border-bottom:1px solid #222;">${i + 1}</td>
                        <td style="padding:5px;border-bottom:1px solid #222;font-size:11px;">${u.email}</td>
                        <td style="padding:5px;border-bottom:1px solid #222;color:#fbbf24;">${u.ref_code || '-'}</td>
                        <td style="padding:5px;border-bottom:1px solid #222;">${u.referred_by || 'NULL'}</td>
                        <td style="padding:5px;border-bottom:1px solid #222;color:${color};">${status}</td>
                    </tr>`;
                });

                html += '</table>';
                showResult(html);

            } catch (err) {
                log('❌ Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        // ============================================================
        // FIX ALL
        // ============================================================
        async function fixAll() {
            if (!supabase || allUsers.length === 0) {
                log('⚠️ Scan first!', 'warning');
                return;
            }

            const nullUsers = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
            if (nullUsers.length === 0) {
                log('✅ All users already have referral!', 'success');
                return;
            }

            log(`🔧 Fixing ${nullUsers.length} users...`, 'info');

            let fixed = 0;
            let failed = 0;

            for (const user of nullUsers) {
                try {
                    let referrerCode = null;

                    // Cari referrer
                    const domain = user.email.split('@')[1];
                    const sameDomain = allUsers.filter(u =>
                        u.email !== user.email &&
                        u.email.split('@')[1] === domain &&
                        u.ref_code &&
                        u.ref_code !== ''
                    );

                    if (sameDomain.length > 0) {
                        referrerCode = sameDomain[0].ref_code;
                    } else {
                        const otherUsers = allUsers.filter(u =>
                            u.email !== user.email &&
                            u.ref_code &&
                            u.ref_code !== ''
                        );
                        if (otherUsers.length > 0) {
                            referrerCode = otherUsers[0].ref_code;
                        }
                    }

                    if (!referrerCode) {
                        log(`❌ No referrer for ${user.email}`, 'error');
                        failed++;
                        continue;
                    }

                    const { error: updateError } = await supabase
                        .from('users')
                        .update({ referred_by: referrerCode })
                        .eq('email', user.email);

                    if (updateError) throw updateError;

                    user.referred_by = referrerCode;
                    fixed++;
                    log(`✅ ${user.email} -> ${referrerCode}`, 'success');

                } catch (err) {
                    log(`❌ ${user.email}: ${err.message}`, 'error');
                    failed++;
                }
            }

            log(`✅ Done! Fixed: ${fixed}, Failed: ${failed}`, 'success');
            scanUsers(); // Refresh
        }

        // ============================================================
        // FORCE FIX
        // ============================================================
        async function forceFix() {
            if (!supabase || allUsers.length === 0) {
                log('⚠️ Scan first!', 'warning');
                return;
            }

            const nullUsers = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
            if (nullUsers.length === 0) {
                log('✅ All users already have referral!', 'success');
                return;
            }

            const mainReferrer = allUsers.find(u => u.ref_code && u.ref_code !== '');
            if (!mainReferrer) {
                log('❌ No user with ref_code found!', 'error');
                return;
            }

            const refCode = mainReferrer.ref_code;
            log(`⚡ Force fixing all with: ${refCode}`, 'warning');

            let fixed = 0;
            let failed = 0;

            for (const user of nullUsers) {
                try {
                    const { error: updateError } = await supabase
                        .from('users')
                        .update({ referred_by: refCode })
                        .eq('email', user.email);

                    if (updateError) throw updateError;

                    user.referred_by = refCode;
                    fixed++;
                    log(`✅ ${user.email} -> ${refCode}`, 'success');

                } catch (err) {
                    log(`❌ ${user.email}: ${err.message}`, 'error');
                    failed++;
                }
            }

            log(`✅ Done! Fixed: ${fixed}, Failed: ${failed}`, 'success');
            scanUsers();
        }

        // ============================================================
        // AUTO RUN
        // ============================================================
        log('🚀 Tool loaded! Click "Test Connection" to start.', 'info');
        console.log('✅ Fix Tool ready!');
    </script>
</body>
</html>
