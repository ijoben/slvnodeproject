<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 Fix Referrals - Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a1228;
            color: #d4d4d4;
            padding: 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(18, 34, 72, 0.95);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(80, 140, 255, 0.1);
        }
        h1 {
            color: #fbbf24;
            font-size: 1.5rem;
        }
        .sub {
            color: #888;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            color: #fff;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
        }
        .btn-success {
            background: linear-gradient(145deg, #22c55e, #16a34a);
        }
        .btn-danger {
            background: linear-gradient(145deg, #ef4444, #dc2626);
        }
        .btn-warning {
            background: linear-gradient(145deg, #fbbf24, #d97706);
        }
        .log-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.75rem;
            border: 1px solid rgba(80, 140, 255, 0.05);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-entry {
            padding: 0.1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .log-entry.success {
            color: #22c55e;
        }
        .log-entry.error {
            color: #ef4444;
        }
        .log-entry.info {
            color: #60a5fa;
        }
        .log-entry.warning {
            color: #fbbf24;
        }
        .log-entry.debug {
            color: #a78bfa;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            margin-top: 1rem;
        }
        table th {
            text-align: left;
            color: #888;
            padding: 0.3rem 0.5rem;
            border-bottom: 2px solid rgba(80, 140, 255, 0.1);
        }
        table td {
            padding: 0.3rem 0.5rem;
            border-bottom: 1px solid rgba(80, 140, 255, 0.03);
            font-family: 'Courier New', monospace;
        }
        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 60px;
            font-size: 0.55rem;
            font-weight: 600;
        }
        .badge.green {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .badge.red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .badge.yellow {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }
        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            margin: 0.5rem 0;
            border-left: 3px solid #fbbf24;
        }
        .status-box .label {
            color: #888;
            font-size: 0.7rem;
        }
        .status-box .value {
            font-size: 1rem;
            font-weight: 700;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .inline-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.4rem 0.8rem;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            flex: 1;
            min-width: 150px;
        }
        .inline-input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }
            .flex-row {
                flex-direction: column;
            }
            .inline-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Fix Referrals - Debug Mode</h1>
        <div class="sub">Diagnosa masalah referral</div>

        <!-- Status -->
        <div class="status-box">
            <div class="label">STATUS</div>
            <div class="value" id="statusValue">⏳ Initializing...</div>
        </div>

        <!-- Buttons -->
        <div class="flex-row">
            <button class="btn btn-primary" id="testBtn">🔌 Test Connection</button>
            <button class="btn btn-primary" id="scanBtn">🔍 Scan Users</button>
            <button class="btn btn-success" id="fixBtn">✅ Fix All</button>
            <button class="btn btn-warning" id="forceBtn">⚡ Force Fix</button>
            <button class="btn btn-danger" id="clearBtn">🗑️ Clear Log</button>
        </div>

        <!-- Manual Fix -->
        <div class="flex-row">
            <input type="text" class="inline-input" id="manualEmail" placeholder="Email user" />
            <input type="text" class="inline-input" id="manualRefCode" placeholder="Referral Code" />
            <button class="btn btn-success" id="manualBtn">✏️ Fix Manual</button>
        </div>

        <!-- Log -->
        <div class="log-box" id="logBox">
            <div class="log-entry info">⏳ Ready...</div>
        </div>

        <!-- Table -->
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Email</th>
                    <th>Ref Code</th>
                    <th>Referred By</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="userTable">
                <tr><td colspan="5" style="text-align:center;color:#666;padding:1rem;">Click "Scan Users" to load</td></tr>
            </tbody>
        </table>

        <div style="text-align:center;color:#555;font-size:0.7rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(80,140,255,0.05);">
            SilverChain · Fix Tool Debug v4.0
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        let supabase = null;
        let allUsers = [];
        let fixedCount = 0;

        // ============================================================
        // DOM REFS
        // ============================================================
        const logBox = document.getElementById('logBox');
        const userTable = document.getElementById('userTable');
        const statusValue = document.getElementById('statusValue');

        // ============================================================
        // LOG FUNCTION
        // ============================================================
        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[${type}]`, msg);
        }

        function setStatus(msg, type = 'info') {
            statusValue.textContent = msg;
            statusValue.style.color = type === 'error' ? '#ef4444' :
                type === 'success' ? '#22c55e' :
                type === 'warning' ? '#fbbf24' : '#60a5fa';
        }

        // ============================================================
        // TEST CONNECTION
        // ============================================================
        async function testConnection() {
            log('🔌 Testing Supabase connection...', 'info');
            setStatus('Testing connection...', 'info');

            try {
                // Coba create client
                if (typeof window.supabase === 'undefined') {
                    throw new Error('Supabase SDK not loaded!');
                }

                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log('✅ Supabase client created!', 'success');

                // Test query
                const { data, error } = await supabase
                    .from('users')
                    .select('count')
                    .limit(1);

                if (error) throw error;

                log('✅ Connection successful! Database accessible.', 'success');
                setStatus('✅ Connected to Supabase', 'success');

                // Check table structure
                const { data: columns, error: colError } = await supabase
                    .rpc('get_table_columns', { table_name: 'users' });

                if (!colError && columns) {
                    log('📋 Table columns: ' + columns.map(c => c.column_name).join(', '), 'info');
                }

                return true;

            } catch (err) {
                log('❌ Connection error: ' + err.message, 'error');
                setStatus('❌ Error: ' + err.message, 'error');
                console.error(err);
                return false;
            }
        }

        // ============================================================
        // SCAN USERS
        // ============================================================
        async function scanUsers() {
            if (!supabase) {
                log('⚠️ Supabase not initialized! Test connection first.', 'warning');
                setStatus('⚠️ Click "Test Connection" first', 'warning');
                return;
            }

            log('🔍 Scanning users...', 'info');
            setStatus('Scanning...', 'info');
            fixedCount = 0;

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .order('email');

                if (error) throw error;

                allUsers = data || [];
                log(`✅ Found ${allUsers.length} users`, 'success');

                const nullRef = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
                log(`📊 ${nullRef.length} users have NULL referred_by`, 'warning');

                // Show sample
                if (nullRef.length > 0) {
                    nullRef.slice(0, 5).forEach(u => {
                        log(`  - ${u.email}: ref_code=${u.ref_code || 'NONE'}, referred_by=${u.referred_by || 'NULL'}`, 'debug');
                    });
                }

                renderTable();
                setStatus(`✅ ${allUsers.length} users loaded, ${nullRef.length} need fix`, 'success');
                log('✅ Scan complete!', 'success');

            } catch (err) {
                log('❌ Scan error: ' + err.message, 'error');
                setStatus('❌ Error: ' + err.message, 'error');
                console.error(err);
            }
        }

        // ============================================================
        // RENDER TABLE
        // ============================================================
        function renderTable() {
            if (allUsers.length === 0) {
                userTable.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#666;padding:1rem;">No users found</td></tr>`;
                return;
            }

            let html = '';
            for (let i = 0; i < allUsers.length; i++) {
                const u = allUsers[i];
                const hasRef = u.referred_by && u.referred_by !== '' && u.referred_by !== 'null';
                const status = hasRef ?
                    `<span class="badge green">✅ OK</span>` :
                    `<span class="badge red">❌ NULL</span>`;

                html += `<tr>
                    <td>${i + 1}</td>
                    <td style="font-size:0.7rem;">${u.email || '-'}</td>
                    <td><span class="badge yellow">${u.ref_code || '-'}</span></td>
                    <td>${u.referred_by && u.referred_by !== '' && u.referred_by !== 'null' ? u.referred_by : '<span style="color:#ef4444;">null</span>'}</td>
                    <td>${status}</td>
                </tr>`;
            }
            userTable.innerHTML = html;
        }

        // ============================================================
        // FIX ALL USERS
        // ============================================================
        async function fixAllUsers() {
            if (!supabase) {
                log('⚠️ Supabase not initialized!', 'warning');
                return;
            }

            if (allUsers.length === 0) {
                log('⚠️ No users. Scan first!', 'warning');
                return;
            }

            const nullUsers = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
            if (nullUsers.length === 0) {
                log('✅ All users already have referral!', 'success');
                return;
            }

            log(`🔧 Fixing ${nullUsers.length} users...`, 'info');
            setStatus(`Fixing ${nullUsers.length} users...`, 'info');

            let fixed = 0;
            let failed = 0;

            for (const user of nullUsers) {
                try {
                    // Cari referrer
                    let referrerCode = null;

                    // Strategy 1: Same domain
                    const domain = user.email.split('@')[1];
                    const sameDomain = allUsers.filter(u =>
                        u.email !== user.email &&
                        u.email.split('@')[1] === domain &&
                        u.ref_code &&
                        u.ref_code !== ''
                    );

                    if (sameDomain.length > 0) {
                        referrerCode = sameDomain[0].ref_code;
                        log(`🔗 ${user.email} -> same domain: ${sameDomain[0].email}`, 'debug');
                    } else {
                        // Strategy 2: Any user with ref_code
                        const otherUsers = allUsers.filter(u =>
                            u.email !== user.email &&
                            u.ref_code &&
                            u.ref_code !== ''
                        );
                        if (otherUsers.length > 0) {
                            referrerCode = otherUsers[0].ref_code;
                            log(`🔗 ${user.email} -> fallback: ${otherUsers[0].email}`, 'debug');
                        }
                    }

                    if (!referrerCode) {
                        log(`❌ No referrer for ${user.email}`, 'error');
                        failed++;
                        continue;
                    }

                    // UPDATE
                    const { error: updateError } = await supabase
                        .from('users')
                        .update({ referred_by: referrerCode })
                        .eq('email', user.email);

                    if (updateError) throw updateError;

                    user.referred_by = referrerCode;
                    fixed++;
                    fixedCount++;
                    log(`✅ ${user.email} -> ${referrerCode}`, 'success');

                } catch (err) {
                    log(`❌ ${user.email}: ${err.message}`, 'error');
                    failed++;
                }
            }

            renderTable();
            setStatus(`✅ Fixed: ${fixed}, Failed: ${failed}`, 'success');
            log(`✅ Done! Fixed: ${fixed}, Failed: ${failed}`, 'success');
        }

        // ============================================================
        // FORCE FIX - PAKAI REFERRAL PERTAMA
        // ============================================================
        async function forceFixAll() {
            if (!supabase) {
                log('⚠️ Supabase not initialized!', 'warning');
                return;
            }

            if (allUsers.length === 0) {
                log('⚠️ No users. Scan first!', 'warning');
                return;
            }

            const nullUsers = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
            if (nullUsers.length === 0) {
                log('✅ All users already have referral!', 'success');
                return;
            }

            const mainReferrer = allUsers.find(u => u.ref_code && u.ref_code !== '');
            if (!mainReferrer) {
                log('❌ No user with ref_code found!', 'error');
                return;
            }

            const refCode = mainReferrer.ref_code;
            log(`⚡ Force fixing all with: ${refCode} (${mainReferrer.email})`, 'warning');
            setStatus(`Force fixing with ${refCode}...`, 'warning');

            let fixed = 0;
            let failed = 0;

            for (const user of nullUsers) {
                try {
                    const { error: updateError } = await supabase
                        .from('users')
                        .update({ referred_by: refCode })
                        .eq('email', user.email);

                    if (updateError) throw updateError;

                    user.referred_by = refCode;
                    fixed++;
                    fixedCount++;
                    log(`✅ ${user.email} -> ${refCode}`, 'success');

                } catch (err) {
                    log(`❌ ${user.email}: ${err.message}`, 'error');
                    failed++;
                }
            }

            renderTable();
            setStatus(`✅ Force fix: ${fixed} fixed, ${failed} failed`, 'success');
            log(`✅ Force fix done! Fixed: ${fixed}, Failed: ${failed}`, 'success');
        }

        // ============================================================
        // MANUAL FIX
        // ============================================================
        async function manualFix() {
            const email = document.getElementById('manualEmail').value.trim();
            const refCode = document.getElementById('manualRefCode').value.trim();

            if (!email || !refCode) {
                log('⚠️ Please enter both Email and Referral Code', 'warning');
                return;
            }

            if (!supabase) {
                log('⚠️ Supabase not initialized!', 'warning');
                return;
            }

            log(`✏️ Manual fix: ${email} -> ${refCode}`, 'info');

            try {
                // Validasi ref code
                const { data: referrer, error: refError } = await supabase
                    .from('users')
                    .select('email, ref_code')
                    .eq('ref_code', refCode)
                    .single();

                if (refError) {
                    log(`❌ Referral code not found: ${refCode}`, 'error');
                    return;
                }

                const { error: updateError } = await supabase
                    .from('users')
                    .update({ referred_by: refCode })
                    .eq('email', email);

                if (updateError) throw updateError;

                // Update local
                const idx = allUsers.findIndex(u => u.email === email);
                if (idx !== -1) {
                    allUsers[idx].referred_by = refCode;
                }

                fixedCount++;
                log(`✅ ${email} -> ${refCode} (referrer: ${referrer.email})`, 'success');
                renderTable();

                document.getElementById('manualEmail').value = '';
                document.getElementById('manualRefCode').value = '';

            } catch (err) {
                log(`❌ Manual fix error: ${err.message}`, 'error');
            }
        }

        // ============================================================
        // CLEAR LOG
        // ============================================================
        function clearLog() {
            logBox.innerHTML = '';
            log('🗑️ Log cleared', 'info');
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('testBtn').addEventListener('click', testConnection);
        document.getElementById('scanBtn').addEventListener('click', scanUsers);
        document.getElementById('fixBtn').addEventListener('click', fixAllUsers);
        document.getElementById('forceBtn').addEventListener('click', forceFixAll);
        document.getElementById('manualBtn').addEventListener('click', manualFix);
        document.getElementById('clearBtn').addEventListener('click', clearLog);

        document.getElementById('manualRefCode').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') manualFix();
        });

        // ============================================================
        // AUTO INIT
        // ============================================================
        async function init() {
            log('🚀 Initializing...', 'info');
            setStatus('Initializing...', 'info');

            // Cek SDK
            if (typeof window.supabase === 'undefined') {
                log('❌ Supabase SDK not loaded! Check internet connection.', 'error');
                setStatus('❌ SDK not loaded', 'error');
                return;
            }

            log('✅ Supabase SDK loaded', 'success');

            // Test connection
            await testConnection();

            // Auto scan
            setTimeout(scanUsers, 1500);

            log('✅ Ready!', 'success');
        }

        // Jalankan
        init();

        console.log('🔥 Fix Tool Debug ready!');
        console.log('Commands: testConnection(), scanUsers(), fixAllUsers(), forceFixAll()');
    </script>
</body>
</html>
