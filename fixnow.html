<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 Fix Referrals NOW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a1228;
            color: #d4d4d4;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(18, 34, 72, 0.95);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(80, 140, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        h1 {
            color: #fbbf24;
            font-size: 1.8rem;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #888;
            margin-bottom: 1.5rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .stat {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0.8rem;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid rgba(80, 140, 255, 0.05);
        }
        .stat .num {
            font-size: 2rem;
            font-weight: 700;
        }
        .stat .label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
        }
        .stat .num.green {
            color: #22c55e;
        }
        .stat .num.red {
            color: #ef4444;
        }
        .stat .num.yellow {
            color: #fbbf24;
        }
        .stat .num.blue {
            color: #60a5fa;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .btn {
            padding: 0.8rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary {
            background: linear-gradient(145deg, #60a5fa, #3b82f6);
        }
        .btn-success {
            background: linear-gradient(145deg, #22c55e, #16a34a);
        }
        .btn-danger {
            background: linear-gradient(145deg, #ef4444, #dc2626);
        }
        .btn-warning {
            background: linear-gradient(145deg, #fbbf24, #d97706);
        }
        .log-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.75rem;
            border: 1px solid rgba(80, 140, 255, 0.05);
        }
        .log-entry {
            padding: 0.1rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .log-entry.success {
            color: #22c55e;
        }
        .log-entry.error {
            color: #ef4444;
        }
        .log-entry.info {
            color: #60a5fa;
        }
        .log-entry.warning {
            color: #fbbf24;
        }
        .log-entry.debug {
            color: #a78bfa;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            margin-top: 1rem;
        }
        table th {
            text-align: left;
            color: #888;
            padding: 0.3rem 0.5rem;
            border-bottom: 2px solid rgba(80, 140, 255, 0.1);
        }
        table td {
            padding: 0.3rem 0.5rem;
            border-bottom: 1px solid rgba(80, 140, 255, 0.03);
            font-family: 'Courier New', monospace;
        }
        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 60px;
            font-size: 0.55rem;
            font-weight: 600;
        }
        .badge.green {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .badge.red {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .badge.yellow {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            margin: 0.5rem 0;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #22c55e);
            border-radius: 60px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .footer {
            text-align: center;
            color: #555;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(80, 140, 255, 0.05);
        }
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .btn-group {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Fix Referrals NOW</h1>
        <div class="sub">Perbaiki semua user yang <strong>referred_by = NULL</strong></div>

        <div class="stats-grid" id="stats">
            <div class="stat">
                <div class="num blue" id="totalUsers">0</div>
                <div class="label">Total Users</div>
            </div>
            <div class="stat">
                <div class="num red" id="nullCount">0</div>
                <div class="label">NULL Referred By</div>
            </div>
            <div class="stat">
                <div class="num green" id="fixedCount">0</div>
                <div class="label">Fixed</div>
            </div>
            <div class="stat">
                <div class="num yellow" id="hasRefCode">0</div>
                <div class="label">Have Ref Code</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="scanBtn">🔍 Scan</button>
            <button class="btn btn-success" id="fixBtn">✅ Fix All</button>
            <button class="btn btn-warning" id="forceFixBtn">⚡ Force Fix All</button>
            <button class="btn btn-danger" id="resetBtn">🔄 Reset</button>
        </div>

        <div class="log-box" id="logBox">
            <div class="log-entry info">⏳ Ready. Click "Scan" to start...</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Email</th>
                    <th>Ref Code</th>
                    <th>Referred By</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="userTable">
                <tr><td colspan="5" style="text-align:center;color:#666;padding:1rem;">Click Scan to load data</td></tr>
            </tbody>
        </table>

        <div class="footer">SilverChain · Fix Tool v3.0</div>
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        let supabase = null;
        let allUsers = [];
        let fixedCount = 0;

        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase ready');
        } catch (err) {
            console.error('❌ Supabase error:', err);
            alert('Error: ' + err.message);
        }

        // ============================================================
        // DOM
        // ============================================================
        const logBox = document.getElementById('logBox');
        const userTable = document.getElementById('userTable');
        const totalUsersEl = document.getElementById('totalUsers');
        const nullCountEl = document.getElementById('nullCount');
        const fixedCountEl = document.getElementById('fixedCount');
        const hasRefCodeEl = document.getElementById('hasRefCode');
        const progressFill = document.getElementById('progressFill');

        // ============================================================
        // FUNCTIONS
        // ============================================================
        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[${type}]`, msg);
        }

        function updateStats() {
            const total = allUsers.length;
            const nullRef = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null').length;
            const hasRef = allUsers.filter(u => u.ref_code && u.ref_code !== '').length;

            totalUsersEl.textContent = total;
            nullCountEl.textContent = nullRef;
            fixedCountEl.textContent = fixedCount;
            hasRefCodeEl.textContent = hasRef;

            const progress = total > 0 ? ((total - nullRef) / total * 100) : 0;
            progressFill.style.width = progress + '%';
        }

        function renderTable() {
            if (allUsers.length === 0) {
                userTable.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#666;padding:1rem;">No data</td></tr>`;
                return;
            }

            let html = '';
            for (let i = 0; i < allUsers.length; i++) {
                const u = allUsers[i];
                const hasRef = u.referred_by && u.referred_by !== '' && u.referred_by !== 'null';
                const status = hasRef ?
                    `<span class="badge green">✅ OK</span>` :
                    `<span class="badge red">❌ NULL</span>`;

                html += `<tr>
                    <td>${i + 1}</td>
                    <td style="font-size:0.7rem;">${u.email || '-'}</td>
                    <td><span class="badge yellow">${u.ref_code || '-'}</span></td>
                    <td>${u.referred_by && u.referred_by !== '' && u.referred_by !== 'null' ? u.referred_by : '<span style="color:#ef4444;">null</span>'}</td>
                    <td>${status}</td>
                </tr>`;
            }
            userTable.innerHTML = html;
            updateStats();
        }

        // ============================================================
        // SCAN
        // ============================================================
        async function scanUsers() {
            if (!supabase) {
                log('❌ Supabase not ready!', 'error');
                return;
            }

            log('🔍 Scanning database...', 'info');
            fixedCount = 0;

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .order('email');

                if (error) throw error;

                allUsers = data || [];
                log(`✅ Found ${allUsers.length} users`, 'success');

                const nullRef = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
                log(`📊 ${nullRef.length} users have NULL referred_by`, 'warning');

                if (nullRef.length > 0) {
                    nullRef.slice(0, 5).forEach(u => {
                        log(`  - ${u.email}: ref_code=${u.ref_code || 'NONE'}, referred_by=${u.referred_by || 'NULL'}`, 'debug');
                    });
                    if (nullRef.length > 5) log(`  ... and ${nullRef.length - 5} more`, 'debug');
                }

                renderTable();
                log('✅ Scan complete!', 'success');

            } catch (err) {
                log(`❌ Scan error: ${err.message}`, 'error');
            }
        }

        // ============================================================
        // FIX ALL - SMART
        // ============================================================
        async function fixAllUsers() {
            if (!supabase) {
                log('❌ Supabase not ready!', 'error');
                return;
            }

            if (allUsers.length === 0) {
                log('⚠️ No users. Scan first!', 'warning');
                return;
            }

            const nullUsers = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
            if (nullUsers.length === 0) {
                log('✅ All users already have referral!', 'success');
                return;
            }

            log(`🔧 Fixing ${nullUsers.length} users...`, 'info');

            let fixed = 0;
            let failed = 0;

            for (const user of nullUsers) {
                try {
                    // Cari referrer
                    let referrerCode = null;

                    // Strategy 1: Same domain
                    const domain = user.email.split('@')[1];
                    const sameDomain = allUsers.filter(u =>
                        u.email !== user.email &&
                        u.email.split('@')[1] === domain &&
                        u.ref_code &&
                        u.ref_code !== ''
                    );

                    if (sameDomain.length > 0) {
                        referrerCode = sameDomain[0].ref_code;
                    } else {
                        // Strategy 2: Any user with ref_code
                        const otherUsers = allUsers.filter(u =>
                            u.email !== user.email &&
                            u.ref_code &&
                            u.ref_code !== ''
                        );
                        if (otherUsers.length > 0) {
                            referrerCode = otherUsers[0].ref_code;
                        }
                    }

                    if (!referrerCode) {
                        log(`❌ No referrer for ${user.email}`, 'error');
                        failed++;
                        continue;
                    }

                    // UPDATE DATABASE
                    const { error: updateError } = await supabase
                        .from('users')
                        .update({ referred_by: referrerCode })
                        .eq('email', user.email);

                    if (updateError) throw updateError;

                    user.referred_by = referrerCode;
                    fixed++;
                    fixedCount++;

                    log(`✅ ${user.email} -> ${referrerCode}`, 'success');

                } catch (err) {
                    log(`❌ ${user.email}: ${err.message}`, 'error');
                    failed++;
                }

                const progress = ((fixed + failed) / nullUsers.length * 100);
                progressFill.style.width = progress + '%';
            }

            renderTable();
            log(`✅ Done! Fixed: ${fixed}, Failed: ${failed}`, 'success');
        }

        // ============================================================
        // FORCE FIX - SEMUA USER PAKAI REFERRAL CODE YANG SAMA
        // ============================================================
        async function forceFixAll() {
            if (!supabase) {
                log('❌ Supabase not ready!', 'error');
                return;
            }

            if (allUsers.length === 0) {
                log('⚠️ No users. Scan first!', 'warning');
                return;
            }

            const nullUsers = allUsers.filter(u => !u.referred_by || u.referred_by === '' || u.referred_by === 'null');
            if (nullUsers.length === 0) {
                log('✅ All users already have referral!', 'success');
                return;
            }

            // Cari referrer utama (user pertama yang punya ref_code)
            const mainReferrer = allUsers.find(u => u.ref_code && u.ref_code !== '');
            if (!mainReferrer) {
                log('❌ No user with ref_code found!', 'error');
                return;
            }

            const refCode = mainReferrer.ref_code;
            log(`⚡ Force fixing all with ref_code: ${refCode} (${mainReferrer.email})`, 'warning');

            let fixed = 0;
            let failed = 0;

            for (const user of nullUsers) {
                try {
                    const { error: updateError } = await supabase
                        .from('users')
                        .update({ referred_by: refCode })
                        .eq('email', user.email);

                    if (updateError) throw updateError;

                    user.referred_by = refCode;
                    fixed++;
                    fixedCount++;
                    log(`✅ ${user.email} -> ${refCode}`, 'success');

                } catch (err) {
                    log(`❌ ${user.email}: ${err.message}`, 'error');
                    failed++;
                }

                const progress = ((fixed + failed) / nullUsers.length * 100);
                progressFill.style.width = progress + '%';
            }

            renderTable();
            log(`✅ Force fix done! Fixed: ${fixed}, Failed: ${failed}`, 'success');
        }

        // ============================================================
        // RESET
        // ============================================================
        function resetAll() {
            if (confirm('Reset all data and rescan?')) {
                allUsers = [];
                fixedCount = 0;
                renderTable();
                log('🔄 Reset complete. Click Scan to reload.', 'warning');
                progressFill.style.width = '0%';
            }
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        document.getElementById('scanBtn').addEventListener('click', scanUsers);
        document.getElementById('fixBtn').addEventListener('click', fixAllUsers);
        document.getElementById('forceFixBtn').addEventListener('click', forceFixAll);
        document.getElementById('resetBtn').addEventListener('click', resetAll);

        // ============================================================
        // AUTO SCAN
        // ============================================================
        setTimeout(scanUsers, 1000);

        console.log('🔥 Fix Tool ready!');
        console.log('Commands: scanUsers(), fixAllUsers(), forceFixAll()');
    </script>
</body>
</html>
