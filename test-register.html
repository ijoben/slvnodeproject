<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1228;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: rgba(18, 34, 72, 0.85);
            border-radius: 28px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        h1 {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a0a0a0;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.1);
            background: rgba(8, 20, 48, 0.5);
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus {
            border-color: rgba(80, 140, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(145deg, #c0c0c0, #888888);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(192, 192, 192, 0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .result {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
            background: rgba(8, 20, 48, 0.3);
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .result.show {
            display: block;
        }
        .result.success {
            color: #6aff8a;
            border-color: rgba(60, 220, 80, 0.15);
        }
        .result.error {
            color: #ff6a6a;
            border-color: rgba(255, 60, 60, 0.15);
        }
        .status {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
            background: rgba(8, 20, 48, 0.3);
            border: 1px solid rgba(80, 140, 255, 0.06);
            color: #888888;
        }
        .status.success {
            color: #6aff8a;
            border-color: rgba(60, 220, 80, 0.15);
        }
        .status.error {
            color: #ff6a6a;
            border-color: rgba(255, 60, 60, 0.15);
        }
        .small {
            font-size: 12px;
            color: #666666;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🔗 Supabase Test</h1>

        <div class="status" id="status">⏳ Initializing...</div>

        <label>Email</label>
        <input type="email" id="email" placeholder="test@email.com" value="test123@email.com" />

        <label>Password</label>
        <input type="password" id="password" placeholder="Min 4 characters" value="123456" />

        <button id="registerBtn">📝 Test Register</button>

        <div class="result" id="result"></div>

        <div class="small">
            ⚡ Data akan masuk ke Supabase Table Editor
        </div>
    </div>

    <script>
        // ============================================================
        // ⚠️ GANTI DENGAN DATA SUPABASE ANDA! ⚠️
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        // ============================================================
        // ELEMENTS
        // ============================================================
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');

        function setStatus(text, type = '') {
            statusEl.textContent = text;
            statusEl.className = 'status ' + type;
        }

        function showResult(text, type = '') {
            resultEl.textContent = text;
            resultEl.className = 'result show ' + type;
        }

        // ============================================================
        // CEK SUPABASE SDK
        // ============================================================
        console.log('1. Checking Supabase SDK...');

        if (typeof window.supabase === 'undefined') {
            setStatus('❌ Supabase SDK not loaded!', 'error');
            showResult('Error: Supabase SDK not loaded.', 'error');
        } else {
            console.log('2. Supabase SDK loaded!');
            setStatus('✅ SDK loaded, creating client...', '');
        }

        // ============================================================
        // BUAT SUPABASE CLIENT (HANYA SEKALI)
        // ============================================================
        console.log('3. Creating Supabase client...');
        console.log('URL:', SUPABASE_URL);

        // Gunakan 'let' bukan 'const' agar bisa di-reassign jika error
        let supabaseClient = null;

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('4. Supabase client created!');
            setStatus('✅ Client created, testing connection...', '');
        } catch (err) {
            console.error('Error creating client:', err);
            setStatus('❌ Failed: ' + err.message, 'error');
            showResult('Error: ' + err.message, 'error');
        }

        // ============================================================
        // TEST KONEKSI
        // ============================================================
        console.log('5. Testing connection...');

        if (supabaseClient) {
            supabaseClient.from('settings').select('*').limit(1)
                .then(({ data, error }) => {
                    console.log('6. Query result:', data, error);

                    if (error) {
                        setStatus('⚠️ Error: ' + error.message, 'error');
                        showResult('Error: ' + error.message + '\n\n💡 Pastikan SQL sudah dijalankan di Supabase.', 'error');
                        return;
                    }

                    setStatus('✅ Connected to Supabase!', 'success');
                    showResult('✅ Connection successful! You can now register.', 'success');
                })
                .catch(err => {
                    console.error('7. Connection error:', err);
                    setStatus('❌ Connection failed: ' + err.message, 'error');
                    showResult('Error: ' + err.message, 'error');
                });
        }

        // ============================================================
        // REGISTER
        // ============================================================
        async function registerUser(email, password) {
            if (!supabaseClient) {
                throw new Error('Supabase client not initialized');
            }

            const hashed = btoa(password + 'silverchain_salt_2026');
            const refCode = email.split('@')[0].toUpperCase() + Math.floor(100 + Math.random() * 900);

            const { data, error } = await supabaseClient
                .from('users')
                .insert({
                    email: email,
                    password: hashed,
                    ref_code: refCode,
                    verified: true,
                    role: 'user'
                })
                .select()
                .single();

            if (error) throw error;
            return data;
        }

        // ============================================================
        // BUTTON
        // ============================================================
        document.getElementById('registerBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const resultEl = document.getElementById('result');

            resultEl.className = 'result';
            resultEl.style.display = 'none';

            if (!email || !email.includes('@')) {
                resultEl.textContent = '❌ Please enter a valid email.';
                resultEl.className = 'result show error';
                return;
            }
            if (password.length < 4) {
                resultEl.textContent = '❌ Password must be at least 4 characters.';
                resultEl.className = 'result show error';
                return;
            }

            if (!supabaseClient) {
                resultEl.textContent = '❌ Supabase client not ready. Please refresh.';
                resultEl.className = 'result show error';
                return;
            }

            this.disabled = true;
            this.textContent = '⏳ Registering...';

            try {
                const result = await registerUser(email, password);
                resultEl.textContent = '✅ User registered successfully!\n\n📧 Email: ' + email + '\n🆔 ID: ' + result.id;
                resultEl.className = 'result show success';
                setStatus('✅ User registered!', 'success');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            } catch (err) {
                console.error('Registration error:', err);
                resultEl.textContent = '❌ ' + (err.message || 'Registration failed');
                resultEl.className = 'result show error';
            }

            this.disabled = false;
            this.textContent = '📝 Test Register';
        });

        console.log('🟢 Page ready!');
    </script>

</body>
</html>
