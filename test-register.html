<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1228;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: rgba(18, 34, 72, 0.85);
            border-radius: 28px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        h1 {
            text-align: center;
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a0a0a0;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.1);
            background: rgba(8, 20, 48, 0.5);
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus {
            border-color: rgba(80, 140, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(145deg, #c0c0c0, #888888);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(192, 192, 192, 0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .result {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
            background: rgba(8, 20, 48, 0.3);
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .result.show {
            display: block;
        }
        .result.success {
            color: #6aff8a;
            border-color: rgba(60, 220, 80, 0.15);
        }
        .result.error {
            color: #ff6a6a;
            border-color: rgba(255, 60, 60, 0.15);
        }
        .small {
            font-size: 12px;
            color: #666666;
            text-align: center;
            margin-top: 12px;
        }
        .console-log {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(80, 140, 255, 0.06);
            font-size: 12px;
            color: #6aff8a;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🔗 Supabase Test</h1>

        <div class="console-log" id="log">⏳ Loading...</div>

        <label>Email</label>
        <input type="email" id="email" placeholder="test@email.com" value="test123@email.com" />

        <label>Password</label>
        <input type="password" id="password" placeholder="Min 4 characters" value="123456" />

        <button id="registerBtn">📝 Test Register</button>

        <div class="result" id="result"></div>

        <div class="small">
            ⚡ Lihat hasil di Console (F12) dan Supabase Table Editor
        </div>
    </div>

    <script>
        // ============================================================
        // ⚠️ GANTI DENGAN DATA SUPABASE ANDA! ⚠️
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        // ============================================================
        // LOGGING
        // ============================================================
        const logEl = document.getElementById('log');

        function log(msg) {
            logEl.textContent += '\n' + msg;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        log('🚀 Starting...');

        // ============================================================
        // CEK SUPABASE SDK
        // ============================================================
        log('🔍 Checking Supabase SDK...');

        if (typeof window.supabase === 'undefined') {
            log('❌ Supabase SDK NOT LOADED!');
            log('💡 Cek koneksi internet atau reload halaman');
            throw new Error('Supabase SDK not loaded');
        }

        log('✅ Supabase SDK loaded!');

        // ============================================================
        // BUAT CLIENT
        // ============================================================
        log('📌 URL: ' + SUPABASE_URL);
        log('📌 Key: ' + SUPABASE_ANON_KEY.substring(0, 15) + '...');

        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            log('✅ Supabase client created!');
        } catch (err) {
            log('❌ Failed to create client: ' + err.message);
            throw err;
        }

        // ============================================================
        // TEST KONEKSI
        // ============================================================
        log('🔍 Testing connection to Supabase...');

        supabase.from('settings').select('*').limit(1)
            .then(({ data, error }) => {
                if (error) {
                    log('❌ Query error: ' + error.message);
                    log('💡 Pastikan SQL sudah dijalankan di Supabase SQL Editor');
                    return;
                }
                log('✅ Connection successful!');
                log('📊 Data: ' + JSON.stringify(data));
                log('🎉 Supabase is ready!');
            })
            .catch(err => {
                log('❌ Connection failed: ' + err.message);
            });

        // ============================================================
        // REGISTER
        // ============================================================
        async function registerUser(email, password) {
            log('📝 Registering: ' + email);

            const hashed = btoa(password + 'silverchain_salt_2026');
            const refCode = email.split('@')[0].toUpperCase() + Math.floor(100 + Math.random() * 900);

            const { data, error } = await supabase
                .from('users')
                .insert({
                    email: email,
                    password: hashed,
                    ref_code: refCode,
                    verified: true,
                    role: 'user'
                })
                .select()
                .single();

            if (error) throw error;
            log('✅ User registered: ' + email);
            return data;
        }

        // ============================================================
        // BUTTON
        // ============================================================
        document.getElementById('registerBtn').addEventListener('click', async function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const resultEl = document.getElementById('result');

            resultEl.className = 'result';
            resultEl.style.display = 'none';

            if (!email || !email.includes('@')) {
                resultEl.textContent = '❌ Please enter a valid email.';
                resultEl.className = 'result show error';
                return;
            }
            if (password.length < 4) {
                resultEl.textContent = '❌ Password must be at least 4 characters.';
                resultEl.className = 'result show error';
                return;
            }

            this.disabled = true;
            this.textContent = '⏳ Registering...';

            try {
                const result = await registerUser(email, password);
                resultEl.textContent = '✅ User registered successfully!\n\n📧 Email: ' + email + '\n🆔 ID: ' + result.id;
                resultEl.className = 'result show success';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            } catch (err) {
                resultEl.textContent = '❌ ' + (err.message || 'Registration failed');
                resultEl.className = 'result show error';
                log('❌ Registration error: ' + err.message);
            }

            this.disabled = false;
            this.textContent = '📝 Test Register';
        });

        log('🟢 Page ready!');
        log('📌 Buka Supabase Dashboard → Table Editor → users untuk cek data');
    </script>

</body>
</html>
