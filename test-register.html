<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilverChain · Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1228;
            color: #d4d4d4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: rgba(18, 34, 72, 0.85);
            border-radius: 28px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #a0a0a0;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.1);
            background: rgba(8, 20, 48, 0.5);
            color: #d4d4d4;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus {
            border-color: rgba(80, 140, 255, 0.3);
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(145deg, #c0c0c0, #888888);
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.15s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(192, 192, 192, 0.2);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .result {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            display: none;
            background: rgba(8, 20, 48, 0.3);
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .result.show {
            display: block;
        }
        .result.success {
            color: #6aff8a;
            border-color: rgba(60, 220, 80, 0.15);
        }
        .result.error {
            color: #ff6a6a;
            border-color: rgba(255, 60, 60, 0.15);
        }
        .small {
            font-size: 12px;
            color: #666666;
            text-align: center;
            margin-top: 12px;
        }
        .debug {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(8, 20, 48, 0.3);
            border: 1px solid rgba(80, 140, 255, 0.06);
            font-size: 12px;
            color: #888888;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🔗 Supabase Test</h1>

        <div class="debug" id="debugLog">⏳ Initializing...</div>

        <label>Email</label>
        <input type="email" id="email" placeholder="test@email.com" value="test123@email.com" />

        <label>Password</label>
        <input type="password" id="password" placeholder="Min 4 characters" value="123456" />

        <button id="registerBtn">📝 Test Register</button>

        <div class="result" id="result"></div>

        <div class="small">
            ⚡ Data akan masuk ke Supabase Table Editor
        </div>
    </div>

    <script>
        // ============================================================
        // ⚠️ GANTI DENGAN DATA SUPABASE ANDA! ⚠️
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        // ============================================================
        // ELEMENTS
        // ============================================================
        const debugEl = document.getElementById('debugLog');
        const resultEl = document.getElementById('result');
        const emailEl = document.getElementById('email');
        const passwordEl = document.getElementById('password');
        const btn = document.getElementById('registerBtn');

        function debug(msg) {
            debugEl.innerHTML += '\n' + msg;
            debugEl.scrollTop = debugEl.scrollHeight;
            console.log(msg);
        }

        function showResult(text, type = '') {
            resultEl.textContent = text;
            resultEl.className = 'result show ' + type;
        }

        // ============================================================
        // 1. CEK SUPABASE SDK
        // ============================================================
        debug('🔍 Checking Supabase SDK...');

        if (typeof window.supabase === 'undefined') {
            debug('❌ Supabase SDK NOT LOADED!');
            showResult('❌ Supabase SDK not loaded. Check internet connection.', 'error');
        } else {
            debug('✅ Supabase SDK loaded!');
        }

        // ============================================================
        // 2. BUAT SUPABASE CLIENT
        // ============================================================
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            debug('✅ Supabase client created!');
            debug('📌 URL: ' + SUPABASE_URL);
            debug('📌 Key: ' + SUPABASE_ANON_KEY.substring(0, 20) + '...');
        } catch (err) {
            debug('❌ Failed to create client: ' + err.message);
            showResult('❌ Failed to create Supabase client: ' + err.message, 'error');
            throw err;
        }

        // ============================================================
        // 3. TEST QUERY LANGSUNG (TANPA FUNGSI)
        // ============================================================
        debug('🔍 Testing connection to Supabase...');

        supabase.from('settings').select('*').limit(1)
            .then(({ data, error }) => {
                if (error) {
                    debug('❌ Query error: ' + error.message);
                    debug('💡 Pastikan SQL sudah dijalankan di Supabase SQL Editor');
                    showResult('⚠️ Query error: ' + error.message + '\n\n💡 Pastikan SQL sudah dijalankan di Supabase.', 'error');
                    return;
                }
                debug('✅ Connection successful!');
                debug('📊 Data: ' + JSON.stringify(data));
                showResult('✅ Connected to Supabase!', 'success');
            })
            .catch(err => {
                debug('❌ Connection failed: ' + err.message);
                showResult('❌ Connection failed: ' + err.message, 'error');
            });

        // ============================================================
        // 4. REGISTER FUNCTION
        // ============================================================
        async function registerUser(email, password) {
            const hashed = btoa(password + 'silverchain_salt_2026');
            const refCode = email.split('@')[0].toUpperCase() + Math.floor(100 + Math.random() * 900);

            debug('📝 Registering: ' + email);

            const { data, error } = await supabase
                .from('users')
                .insert({
                    email: email,
                    password: hashed,
                    ref_code: refCode,
                    verified: true,
                    role: 'user'
                })
                .select()
                .single();

            if (error) throw error;
            debug('✅ User registered: ' + email);
            return data;
        }

        // ============================================================
        // 5. REGISTER BUTTON
        // ============================================================
        btn.addEventListener('click', async function() {
            const email = emailEl.value.trim();
            const password = passwordEl.value.trim();

            resultEl.className = 'result';
            resultEl.style.display = 'none';

            if (!email || !email.includes('@')) {
                showResult('❌ Please enter a valid email.', 'error');
                return;
            }
            if (password.length < 4) {
                showResult('❌ Password must be at least 4 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Registering...';

            try {
                const result = await registerUser(email, password);
                showResult('✅ User registered successfully!\n\n📧 Email: ' + email + '\n🆔 ID: ' + result.id, 'success');
                debug('✅ Registration result: ' + JSON.stringify(result));
                emailEl.value = '';
                passwordEl.value = '';
            } catch (err) {
                debug('❌ Registration error: ' + err.message);
                showResult('❌ ' + (err.message || 'Registration failed'), 'error');
            }

            btn.disabled = false;
            btn.textContent = '📝 Test Register';
        });

        // ============================================================
        // 6. DEBUG INFO
        // ============================================================
        debug('🟢 Test page ready!');
        debug('📌 Jika error, cek:');
        debug('   1. Supabase URL dan Anon Key');
        debug('   2. SQL sudah dijalankan di Supabase');
        debug('   3. Internet connection');
    </script>

</body>
</html>
