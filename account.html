        @media (max-width: 360px) { .info-grid { grid-template-columns: 1fr; } .action-buttons { grid-template-columns: 1fr; } .btn-action.admin { grid-column: span 1; } .bottom-nav a { min-width: 40px; } .bottom-nav a i { font-size: 0.95rem; } .bottom-nav a span { font-size: 0.4rem; } }

<body>
    <div class="container">
        <div id="toastMessage" class="toast-message"><i class="fas fa-check-circle"></i> <span id="toastText">Success</span></div>

    <script>
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';
        const STORAGE_KEYS = { CURRENT_USER: 'silverchain_current_user' };
        const FIX_REFERRAL_KEY = 'silverchain_fix_referral_done_v2';

        let currentUser = null;
        let supabaseClient = null;
        let isFixingReferral = false;

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created!');
        } catch (err) {
            console.error('❌ Supabase error:', err);
        }

        function generateReferralCode(email) {
            const prefix = email.split('@')[0].substring(0, 4).toUpperCase();
            const random = Math.random().toString(36).substring(2, 6).toUpperCase();
            return prefix + random;
        }

        // ===== AUTO FIX REFERRAL UNTUK SEMUA MEMBER =====
        async function autoFixAllReferrals() {
            if (isFixingReferral) return;
            isFixingReferral = true;

            try {
                console.log('🔧 Starting auto-fix referrals for all members...');
                
                // Ambil semua user
                const { data: allUsers, error } = await supabaseClient
                    .from('users')
                    .select('*');

                if (error) throw error;

                let fixedRefCode = 0;
                let fixedReferredBy = 0;
                let totalUsers = allUsers.length;

                console.log(`📊 Total users: ${totalUsers}`);

                // STEP 1: Buat referral code untuk yang belum punya
                for (const user of allUsers) {
                    if (!user.ref_code) {
                        const newCode = generateReferralCode(user.email);
                        const { error: updateError } = await supabaseClient
                            .from('users')
                            .update({ ref_code: newCode })
                            .eq('email', user.email);
                        
                        if (!updateError) {
                            fixedRefCode++;
                            console.log(`✅ Fixed ref_code for: ${user.email} -> ${newCode}`);
                        }
                    }
                }

                // STEP 2: Isi referred_by untuk yang masih null
                // Strategi: 
                // 1. Coba cari referrer dengan domain email yang sama
                // 2. Jika tidak ada, gunakan current user sebagai referrer
                // 3. Jika current user sendiri, cari user lain
                
                for (const user of allUsers) {
                    // Skip jika sudah punya referred_by atau ini adalah current user
                    if (user.referred_by || user.email === currentUser.email) continue;

                    let referrerCode = null;
                    
                    // Cari referrer dengan domain email yang sama
                    const userDomain = user.email.split('@')[1];
                    const sameDomainUsers = allUsers.filter(u => 
                        u.email.split('@')[1] === userDomain && 
                        u.email !== user.email &&
                        u.ref_code &&
                        u.ref_code !== user.ref_code
                    );
                    
                    if (sameDomainUsers.length > 0) {
                        // Gunakan user pertama dengan domain yang sama
                        referrerCode = sameDomainUsers[0].ref_code;
                        console.log(`🔗 Found same domain referrer for ${user.email}: ${sameDomainUsers[0].email} (${referrerCode})`);
                    } else {
                        // Cari referrer lain yang bukan dirinya sendiri
                        const otherUsers = allUsers.filter(u => 
                            u.email !== user.email && 
                            u.ref_code && 
                            u.ref_code !== user.ref_code
                        );
                        
                        if (otherUsers.length > 0) {
                            // Gunakan user pertama yang ditemukan
                            referrerCode = otherUsers[0].ref_code;
                            console.log(`🔗 Using fallback referrer for ${user.email}: ${otherUsers[0].email} (${referrerCode})`);
                        } else if (currentUser && currentUser.ref_code && currentUser.email !== user.email) {
                            // Terakhir, gunakan current user
                            referrerCode = currentUser.ref_code;
                            console.log(`🔗 Using current user as referrer for ${user.email}: ${currentUser.email} (${referrerCode})`);
                        }
                    }

                    // Update referred_by jika ada referrer
                    if (referrerCode) {
                        const { error: updateError } = await supabaseClient
                            .from('users')
                            .update({ referred_by: referrerCode })
                            .eq('email', user.email);
                        
                        if (!updateError) {
                            fixedReferredBy++;
                            console.log(`✅ Fixed referred_by for: ${user.email} -> ${referrerCode}`);
                        }
                    }
                }

                // STEP 3: Cek parameter referral di URL untuk current user
                const urlParams = new URLSearchParams(window.location.search);
                const refParam = urlParams.get('ref');
                
                if (refParam && currentUser && !currentUser.referred_by) {
                    const { error: updateError } = await supabaseClient
                        .from('users')
                        .update({ referred_by: refParam })
                        .eq('email', currentUser.email);
                    
                    if (!updateError) {
                        fixedReferredBy++;
                        console.log(`✅ Updated referred_by for ${currentUser.email} to ${refParam}`);
                    }
                }

                // Tandai sudah fix di localStorage
                localStorage.setItem(FIX_REFERRAL_KEY, 'true');
                localStorage.setItem(FIX_REFERRAL_KEY + '_timestamp', new Date().toISOString());

                console.log(`✅ Auto-fix completed! Fixed ${fixedRefCode} ref_codes and ${fixedReferredBy} referred_by`);
                
                // Refresh current user data
                if (currentUser) {
                    const updatedUser = await getUserByEmail(currentUser.email);
                    if (updatedUser) {
                        currentUser = updatedUser;
                        localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({
                            email: currentUser.email,
                            ref_code: currentUser.ref_code
                        }));
                    }
                }

                return { success: true, fixedRefCode, fixedReferredBy };
            } catch (error) {
                console.error('❌ Auto-fix referrals error:', error);
                return { success: false, error: error.message };
            } finally {
                isFixingReferral = false;
            }
        }

        // ===== CEK APAKAH PERLU FIX =====
        async function checkIfNeedFix() {
            try {
                // Cek di localStorage
                const alreadyFixed = localStorage.getItem(FIX_REFERRAL_KEY);
                if (alreadyFixed === 'true') {
                    return false;
                }

                // Cek di database
                const { data: users, error } = await supabaseClient
                    .from('users')
                    .select('email, ref_code, referred_by')
                    .is('referred_by', null);

                if (error) throw error;
                
                const needFix = users && users.length > 0;
                console.log(`🔍 Need fix: ${needFix} (${users?.length || 0} users with null referred_by)`);
                return needFix;
            } catch (error) {
                console.error('Check fix error:', error);
                return false;
            }
        }

        async function getUserByEmail(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .single();
                if (error && error.code === 'PGRST116') return null;
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Get user error:', error);
                return null;
            }
        }

        async function getUserDeposits(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('deposits')
                    .select('*')
                    .eq('email', email)
                    .order('timestamp', { ascending: false });
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Get user deposits error:', error);
                return [];
            }
        }

        async function getUserWithdrawals(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('withdrawals')
                    .select('*')
                    .eq('email', email)
                    .order('timestamp', { ascending: false });
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Get user withdrawals error:', error);
                return [];
            }
        }

        async function getDownline(refCode) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('referred_by', refCode)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                console.log(`📊 Found ${data?.length || 0} referrals for code: ${refCode}`);
                return data || [];
            } catch (error) {
                console.error('Get downline error:', error);
                return [];
            }
        }

        async function getSetting(key) {
            try {
                const { data, error } = await supabaseClient
                    .from('settings')
                    .select('value')
                    .eq('key', key)
                    .single();
                if (error && error.code === 'PGRST116') return null;
                if (error) throw error;
                return data ? data.value : null;
            } catch (error) {
                console.error('Get setting error:', error);
                return null;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        async function loadCurrentUser() {
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (saved) {
                    const data = JSON.parse(saved);
                    const user = await getUserByEmail(data.email);
                    if (user) {
                        currentUser = user;
                        return true;
                    }
                }
                return false;
            } catch (e) {
                console.error('Load user error:', e);
                return false;
            }
        }

        async function checkAuth() {
            if (!supabaseClient) {
                console.error('❌ Supabase not initialized!');
                showToast('⚠️ System not ready. Please refresh.');
                return false;
            }

            const isLoggedIn = await loadCurrentUser();

            if (!isLoggedIn || !currentUser) {
                console.log('🔒 Not logged in, redirecting to /auth');
                window.location.href = '/auth';
                return false;
            }

            return true;
        }

        document.getElementById('copyRefLinkBtn').addEventListener('click', function() {
            const linkText = document.getElementById('infoRefLink').textContent;
            if (!linkText || linkText === '-') {
                showToast('❌ No referral link available.');
                return;
            }

            if (navigator.clipboard) {
                navigator.clipboard.writeText(linkText).then(() => {
                    this.classList.add('copied');
                    this.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    showToast('📋 Referral link copied!');
                    setTimeout(() => {
                        this.classList.remove('copied');
                        this.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    }, 2500);
                }).catch(() => {
                    fallbackCopy(linkText);
                });
            } else {
                fallbackCopy(linkText);
            }
        });

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copyRefLinkBtn');
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                showToast('📋 Referral link copied!');
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2500);
            } catch (e) {
                showToast('❌ Failed to copy. Please copy manually.');
            }
            document.body.removeChild(ta);
        }

        async function updateUI() {
            if (!supabaseClient) {
                console.warn('⏳ Waiting for Supabase...');
                setTimeout(updateUI, 1000);
                return;
            }

            if (!currentUser) {
                document.getElementById('profileName').textContent = '-';
                document.getElementById('profileEmail').textContent = 'Please login first';
                document.getElementById('infoEmail').textContent = '-';
                document.getElementById('infoRefCode').textContent = '-';
                document.getElementById('infoRefLink').textContent = '-';
                document.getElementById('infoRole').textContent = '-';
                document.getElementById('adminPanelBtn').style.display = 'none';
                document.getElementById('downlineBody').innerHTML =
                    `<tr><td colspan="5" class="empty">Please login first</td></tr>`;
                document.getElementById('downlineTotal').textContent = '0';
                document.getElementById('downlinePending').textContent = '0';
                document.getElementById('downlineEarnings').textContent = '0';
                return;
            }

            const user = await getUserByEmail(currentUser.email);
            if (!user) return;

            document.getElementById('profileName').textContent = currentUser.email.split('@')[0];
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('infoEmail').textContent = currentUser.email;
            document.getElementById('infoRefCode').textContent = user.ref_code || '-';

            const domain = window.location.host;
            const refLink = `https://${domain}/?ref=${user.ref_code || ''}`;
            document.getElementById('infoRefLink').textContent = refLink;

            const isAdmin = user.role === 'admin';
            document.getElementById('infoRole').textContent = isAdmin ? '👑 Admin' : 'Member';

            const adminBtn = document.getElementById('adminPanelBtn');
            if (isAdmin) {
                adminBtn.style.display = 'flex';
                adminBtn.style.gridColumn = 'span 2';
            } else {
                adminBtn.style.display = 'none';
            }

            console.log(`🔍 Fetching downline for ref_code: ${user.ref_code}`);
            const downline = await getDownline(user.ref_code);
            const totalReferrals = downline.length;
            
            const activeReferrals = downline.filter(d => d.verified === true).length;
            const pendingReferrals = totalReferrals - activeReferrals;

            let totalEarnings = 0;
            const refPercent = parseInt(await getSetting('ref_percent')) || 3;
            
            for (const ref of downline) {
                const deposits = await getUserDeposits(ref.email);
                const firstDeposit = deposits
                    .filter(d => d.status === 'approved')
                    .sort((a, b) => a.timestamp - b.timestamp)[0];
                if (firstDeposit) {
                    totalEarnings += firstDeposit.usdt * refPercent / 100;
                }
            }
            
            const wdHistory = await getUserWithdrawals(currentUser.email);
            const totalWd = wdHistory
                .filter(w => w.status === 'approved')
                .reduce((sum, w) => sum + w.amount, 0);
            totalEarnings = Math.round((totalEarnings - totalWd) * 100) / 100;

            document.getElementById('downlineTotal').textContent = totalReferrals;
            document.getElementById('downlinePending').textContent = pendingReferrals;
            document.getElementById('downlineEarnings').textContent = totalEarnings.toFixed(1);

            if (downline.length === 0) {
                document.getElementById('downlineBody').innerHTML =
                    `<tr><td colspan="5" class="empty">No referrals yet. Share your referral link!</td></tr>`;
            } else {
                let html = '';
                for (let i = 0; i < downline.length; i++) {
                    const d = downline[i];
                    const joined = new Date(d.created_at).toLocaleDateString('en-US');
                    
                    const isActive = d.verified === true;
                    const statusHtml = isActive ? 
                        '<span class="status-active">✅ Active</span>' : 
                        '<span class="status-pending">⏳ Pending</span>';
                    
                    let contribution = '0 USDT';
                    let contributionClass = 'contribution-zero';
                    
                    const deposits = await getUserDeposits(d.email);
                    const firstDeposit = deposits
                        .filter(dep => dep.status === 'approved')
                        .sort((a, b) => a.timestamp - b.timestamp)[0];
                    
                    if (firstDeposit) {
                        const amount = (firstDeposit.usdt * refPercent / 100).toFixed(1);
                        contribution = amount + ' USDT';
                        contributionClass = '';
                    }
                    
                    html += `<tr>
                        <td>${i + 1}</td>
                        <td style="font-size:0.7rem;">${d.email}</td>
                        <td>${joined}</td>
                        <td>${statusHtml}</td>
                        <td class="${contributionClass}">${contribution}</td>
                    </tr>`;
                }
                document.getElementById('downlineBody').innerHTML = html;
            }

            const copyBtn = document.getElementById('copyRefLinkBtn');
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
        }

        function logout() {
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            currentUser = null;
            updateUI();
            showToast('👋 Logged out successfully.');
            setTimeout(() => { window.location.href = '/'; }, 500);
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        document.getElementById('adminPanelBtn').addEventListener('click', function() {
            window.location.href = '/admin';
        });

        document.getElementById('changePasswordBtn').addEventListener('click', function() {
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('modalCurrentPassword').value = '';
            document.getElementById('modalNewPassword').value = '';
            document.getElementById('modalConfirmPassword').value = '';
            document.getElementById('modalPasswordResult').className = 'result-msg';
            document.getElementById('modalPasswordResult').style.display = 'none';
        });

        document.getElementById('closePasswordModal').addEventListener('click', function() {
            document.getElementById('passwordModal').classList.remove('active');
        });

        document.getElementById('passwordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
            }
        });

        document.getElementById('modalChangePasswordBtn').addEventListener('click', async function() {
            const current = document.getElementById('modalCurrentPassword').value.trim();
            const newPass = document.getElementById('modalNewPassword').value.trim();
            const confirm = document.getElementById('modalConfirmPassword').value.trim();
            const result = document.getElementById('modalPasswordResult');

            result.className = 'result-msg';
            result.style.display = 'none';

            if (!current) {
                result.className = 'result-msg error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter current password.';
                result.style.display = 'block';
                return;
            }

            if (newPass.length < 4) {
                result.className = 'result-msg error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> New password must be at least 4 characters.';
                result.style.display = 'block';
                return;
            }

            if (newPass !== confirm) {
                result.className = 'result-msg error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match.';
                result.style.display = 'block';
                return;
            }

            try {
                const user = await getUserByEmail(currentUser.email);
                if (!user) {
                    result.className = 'result-msg error';
                    result.innerHTML = '<i class="fas fa-exclamation-circle"></i> User not found.';
                    result.style.display = 'block';
                    return;
                }

                const hashed = btoa(current + 'silverchain_salt_2026');
                if (user.password !== hashed) {
                    result.className = 'result-msg error';
                    result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Current password is incorrect.';
                    result.style.display = 'block';
                    return;
                }
            } catch (err) {
                result.className = 'result-msg error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Error verifying password.';
                result.style.display = 'block';
                return;
            }

            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                const newHashed = btoa(newPass + 'silverchain_salt_2026');
                const { error } = await supabaseClient
                    .from('users')
                    .update({
                        password: newHashed,
                        updated_at: new Date().toISOString()
                    })
                    .eq('email', currentUser.email);

                if (error) throw error;

                document.getElementById('modalCurrentPassword').value = '';
                document.getElementById('modalNewPassword').value = '';
                document.getElementById('modalConfirmPassword').value = '';

                result.className = 'result-msg success';
                result.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Password changed successfully!';
                result.style.display = 'block';

                setTimeout(() => {
                    document.getElementById('passwordModal').classList.remove('active');
                    showToast('✅ Password changed successfully!');
                }, 1500);

            } catch (err) {
                result.className = 'result-msg error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (err.message || 'Failed to change password.');
                result.style.display = 'block';
            }

            this.disabled = false;
            this.innerHTML = '<i class="fas fa-save"></i> Change Password';
        });

        async function init() {
            console.log('🔄 Account page initializing...');

            if (!supabaseClient) {
                console.error('❌ Supabase not ready!');
                showToast('❌ System not ready. Please refresh.');
                setTimeout(init, 2000);
                return;
            }

            const authPassed = await checkAuth();
            if (!authPassed) return;

            // AUTO FIX: Perbaiki semua referral tanpa tombol
            const needFix = await checkIfNeedFix();
            if (needFix) {
                console.log('🔧 Auto-fixing referrals for all members...');
                await autoFixAllReferrals();
                showToast('✅ Referral data fixed for all members!');
            } else {
                console.log('✅ No referral fix needed.');
            }

            await updateUI();

            console.log('🟢 Account page ready!');
            console.log('👤 User:', currentUser.email);
            console.log('🔗 Referral Code:', currentUser.ref_code);
            console.log('🔗 Referred By:', currentUser.referred_by || 'None');
            
            // Tampilkan semua user di console untuk debugging
            const { data: allUsers } = await supabaseClient
                .from('users')
                .select('email, ref_code, referred_by, verified');
            console.log('📊 All users after fix:', allUsers);
        }

        init();

        setInterval(async () => {
            if (currentUser) {
                await updateUI();
            }
        }, 10000);

        console.log('🟢 SilverChain Account Page ready.');
        console.log('📌 Supabase URL:', SUPABASE_URL);
        
        console.log('💡 Useful commands:');
        console.log('  - autoFixAllReferrals() - Fix semua referral');
        console.log('  - currentUser - Lihat data user saat ini');
        console.log('  - checkIfNeedFix() - Cek apakah perlu fix');
    </script>
</body>
