<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>SilverChain · Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            padding: 1.5rem 1rem 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1050px;
            width: 100%;
        }
        .section-card {
            background: rgba(18, 34, 72, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            padding: 2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(100,140,220,0.15);
            border: 1px solid rgba(80,140,255,0.08);
        }
        .badge-silver {
            background: rgba(60, 120, 255, 0.06);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.25rem 1rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #c0c0c0;
        }
        .badge-success {
            background: rgba(60, 220, 80, 0.1);
            border: 1px solid rgba(60, 220, 80, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #6aff8a;
        }
        .badge-warning {
            background: rgba(250, 200, 60, 0.1);
            border: 1px solid rgba(250, 200, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #fbbf24;
        }
        .badge-danger {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #ff6a6a;
        }
        .owner-badge {
            background: rgba(255, 200, 60, 0.1);
            border: 1px solid rgba(255, 200, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.6rem;
            color: #fcd34d;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #c0c0c0, #888888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 30px rgba(192,192,192,0.15);
        }
        .profile-name {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #e0e0e0;
        }
        .profile-email {
            text-align: center;
            color: #c0c0c0;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* SALDO GRID */
        .saldo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .saldo-card {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .saldo-card .label {
            font-size: 0.65rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .saldo-card .amount {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e0e0e0;
            margin: 0.2rem 0;
        }
        .saldo-card .amount.referral {
            color: #c0c0c0;
        }
        .saldo-card .sub {
            font-size: 0.6rem;
            color: #a0a0a0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(80, 140, 255, 0.06);
        }
        .info-row .label {
            color: #c0c0c0;
            font-size: 0.85rem;
        }
        .info-row .value {
            color: #e0e0e0;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .info-row .value code {
            background: rgba(8, 20, 48, 0.3);
            padding: 0.1rem 0.6rem;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #c0c0c0;
        }

        /* ===== DOWNLINE SECTION ===== */
        .downline-section {
            margin-top: 1.5rem;
            border-top: 1px solid rgba(80, 140, 255, 0.06);
            padding-top: 1.2rem;
        }
        .downline-section h4 {
            color: #e0e0e0;
            margin-bottom: 0.8rem;
        }
        .downline-section h4 i {
            color: #c0c0c0;
            margin-right: 8px;
        }
        .downline-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }
        .downline-stat {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 1rem;
            padding: 0.6rem;
            text-align: center;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .downline-stat .num {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e0e0e0;
        }
        .downline-stat .label {
            font-size: 0.55rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .downline-stat.active .num {
            color: #6aff8a;
        }
        .downline-stat.pending .num {
            color: #fbbf24;
        }
        .downline-stat.earnings .num {
            color: #60a5fa;
        }

        .downline-table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 0.5rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(80, 140, 255, 0.04);
        }
        .downline-table-wrapper table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .downline-table-wrapper table th {
            text-align: left;
            color: #a0a0a0;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-bottom: 1px solid rgba(80, 140, 255, 0.06);
            white-space: nowrap;
        }
        .downline-table-wrapper table td {
            padding: 0.4rem 0.8rem;
            color: #c0c0c0;
            border-bottom: 1px solid rgba(80, 140, 255, 0.03);
            white-space: nowrap;
        }
        .downline-table-wrapper table .empty {
            color: #a0a0a0;
            text-align: center;
            padding: 1.5rem 0;
        }

        /* ===== UBAH PASSWORD ===== */
        .change-password-section {
            margin-top: 1.5rem;
            border-top: 1px solid rgba(80, 140, 255, 0.06);
            padding-top: 1.2rem;
        }
        .change-password-section h4 {
            color: #e0e0e0;
            margin-bottom: 0.8rem;
        }
        .change-password-section h4 i {
            color: #c0c0c0;
            margin-right: 8px;
        }
        .password-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .password-form .input-group {
            flex: 1;
            min-width: 150px;
        }
        .password-form .input-group label {
            display: block;
            color: #a0a0a0;
            font-size: 0.65rem;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .password-form .input-group input {
            width: 100%;
            background: rgba(8, 20, 48, 0.5);
            border: 1px solid rgba(80, 140, 255, 0.06);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            color: #d4d4d4;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .password-form .input-group input:focus {
            border-color: rgba(80, 140, 255, 0.2);
        }
        .password-form .input-group input::placeholder {
            color: #666666;
        }
        .btn-change-password {
            background: linear-gradient(145deg, #c0c0c0, #888888);
            border: none;
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.6rem;
            align-self: flex-end;
            white-space: nowrap;
        }
        .btn-change-password:hover {
            box-shadow: 0 12px 40px -6px rgba(192,192,192,0.2);
            transform: translateY(-2px);
        }
        .btn-change-password:active {
            transform: scale(0.97);
        }
        .btn-change-password:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .password-result {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: none;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            width: 100%;
        }
        .password-result.success {
            display: block;
            background: rgba(60, 220, 80, 0.1);
            border: 1px solid rgba(60, 220, 80, 0.15);
            color: #6aff8a;
        }
        .password-result.error {
            display: block;
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.15);
            color: #ff6a6a;
        }
        .password-result i {
            margin-right: 8px;
        }

        .btn-danger {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.2);
            border-radius: 60px;
            padding: 0.7rem 2rem;
            color: #ff6a6a;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-danger:hover {
            background: rgba(255, 60, 60, 0.2);
        }
        .btn-danger i {
            margin-right: 8px;
        }
        .btn-admin {
            background: rgba(60, 120, 255, 0.1);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            color: #c0c0c0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: none;
        }
        .btn-admin:hover {
            background: rgba(60, 120, 255, 0.2);
        }
        .btn-admin i {
            margin-right: 8px;
            color: #a0a0a0;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(12, 28, 60, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(80, 140, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.4rem 0 0.6rem;
            z-index: 100;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
        }
        .bottom-nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.55rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: 0.2s;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            min-width: 60px;
            position: relative;
        }
        .bottom-nav a i {
            font-size: 1.3rem;
        }
        .bottom-nav a span {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .bottom-nav a.active {
            color: #e0e0e0;
        }
        .bottom-nav a.active i {
            color: #c0c0c0;
            text-shadow: 0 0 25px rgba(192,192,192,0.15);
        }
        .bottom-nav a:hover {
            color: #e8e8e8;
        }

        .toast-message {
            background: rgba(12, 28, 60, 0.8);
            backdrop-filter: blur(8px);
            border-left: 4px solid #c0c0c0;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-size: 0.85rem;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }
        .toast-message.show {
            display: flex;
        }

        .footer-copyright {
            text-align: center;
            color: #888888;
            font-size: 0.7rem;
            padding: 1rem 0 0.5rem;
            border-top: 1px solid rgba(80, 140, 255, 0.05);
            margin-top: 1rem;
        }

        @media (max-width: 700px) {
            .saldo-grid {
                grid-template-columns: 1fr 1fr;
            }
            .downline-stats {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 0.4rem;
            }
            .downline-stat .num {
                font-size: 1rem;
            }
            .password-form {
                flex-direction: column;
                align-items: stretch;
            }
            .password-form .input-group {
                min-width: 100%;
            }
            .btn-change-password {
                align-self: stretch;
                text-align: center;
            }
        }
        @media (max-width: 480px) {
            .section-card {
                padding: 1.5rem 1rem;
            }
            .saldo-grid {
                grid-template-columns: 1fr;
            }
            .downline-stats {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 0.3rem;
            }
            .downline-stat {
                padding: 0.4rem 0.3rem;
            }
            .downline-stat .num {
                font-size: 0.9rem;
            }
            .downline-stat .label {
                font-size: 0.45rem;
            }
            .bottom-nav a {
                font-size: 0.5rem;
                padding: 0.1rem 0.3rem;
                min-width: 45px;
            }
            .bottom-nav a i {
                font-size: 1.1rem;
            }
            .bottom-nav a span {
                font-size: 0.5rem;
            }
            .info-row {
                flex-direction: column;
                gap: 0.2rem;
            }
            .password-result {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
            .downline-table-wrapper table {
                font-size: 0.65rem;
                min-width: 400px;
            }
            .downline-table-wrapper table th,
            .downline-table-wrapper table td {
                padding: 0.3rem 0.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div id="toastMessage" class="toast-message"><i class="fas fa-check-circle"></i> <span id="toastText">Success</span></div>

            <!-- TOMBOL ADMIN -->
            <button class="btn-admin" id="adminPanelBtn"><i class="fas fa-user-shield"></i> Admin Panel</button>

            <!-- LOGOUT -->
            <button class="btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>

            <!-- Copyright -->
            <div class="footer-copyright">Copyright 2026</div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="/" id="navHome">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/dashboard" id="navBuy">

    <script>
        // ============================================================
        // 1. SUPABASE CONFIG
        // ============================================================

        // ⚠️ GANTI DENGAN DATA SUPABASE ANDA! ⚠️
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI';

        // ============================================================
        // 2. VARIABLES
        // ============================================================
        const STORAGE_KEYS = {
            CURRENT_USER: 'silverchain_current_user'
        };
        const ADMIN_EMAIL = 'admin@silverchain.io';

        let currentUser = null;
        let supabaseClient = null;

        // ============================================================
        // 3. INIT SUPABASE
        // ============================================================
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created!');
        } catch (err) {
            console.error('❌ Supabase error:', err);
        }

        // ============================================================
        // 4. SUPABASE FUNCTIONS
        // ============================================================

        // --- USER ---
        async function getUserByEmail(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .single();
                if (error && error.code === 'PGRST116') return null;
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Get user error:', error);
                return null;
            }
        }

        async function getAllUsers() {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Get all users error:', error);
                return [];
            }
        }

        // --- DEPOSIT ---
        async function getUserDeposits(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('deposits')
                    .select('*')
                    .eq('email', email)
                    .order('timestamp', { ascending: false });
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Get user deposits error:', error);
                return [];
            }
        }

        // --- WITHDRAW ---
        async function getUserWithdrawals(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('withdrawals')
                    .select('*')
                    .eq('email', email)
                    .order('timestamp', { ascending: false });
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Get user withdrawals error:', error);
                return [];
            }
        }

        // --- BALANCE ---
        async function getPersonalBalance(email) {
            try {
                const deposits = await getUserDeposits(email);
                const approved = deposits.filter(d => d.status === 'approved');
                const total = approved.reduce((sum, d) => sum + d.usdt + (d.bonus || 0), 0);
                return Math.round(total * 100) / 100;
            } catch (error) {
                console.error('Get personal balance error:', error);
                return 0;
            }
        }

        async function getReferralBalance(email) {
            try {
                const user = await getUserByEmail(email);
                if (!user) return 0;

                const { data: referrals } = await supabaseClient
                    .from('users')
                    .select('email')
                    .eq('referred_by', user.ref_code);

                const { data: settings } = await supabaseClient
                    .from('settings')
                    .select('value')
                    .eq('key', 'ref_percent')
                    .single();

                const refPercent = parseInt(settings ? settings.value : 3) || 3;
                let total = 0;

                for (const ref of referrals) {
                    const deposits = await getUserDeposits(ref.email);
                    const firstDeposit = deposits
                        .filter(d => d.status === 'approved')
                        .sort((a, b) => a.timestamp - b.timestamp)[0];

                    if (firstDeposit) {
                        total += firstDeposit.usdt * refPercent / 100;
                    }
                }

                const withdrawals = await getUserWithdrawals(email);
                const totalWd = withdrawals
                    .filter(w => w.status === 'approved')
                    .reduce((sum, w) => sum + w.amount, 0);

                return Math.round((total - totalWd) * 100) / 100;
            } catch (error) {
                console.error('Get referral balance error:', error);
                return 0;
            }
        }

        // --- DOWNLINE ---
        async function getDownline(refCode) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('referred_by', refCode)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                return data || [];
            } catch (error) {
                console.error('Get downline error:', error);
                return [];
            }
        }

        // --- SETTINGS ---
        async function getSetting(key) {
            try {
                const { data, error } = await supabaseClient
                    .from('settings')
                    .select('value')
                    .eq('key', key)
                    .single();
                if (error && error.code === 'PGRST116') return null;
                if (error) throw error;
                return data ? data.value : null;
            } catch (error) {
                console.error('Get setting error:', error);
                return null;
            }
        }

        // ============================================================
        // 5. TOAST
        // ============================================================
        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // ============================================================
        // 6. LOAD & CHECK AUTH
        // ============================================================
        async function loadCurrentUser() {
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (saved) {
                    const data = JSON.parse(saved);
                    const user = await getUserByEmail(data.email);
                    if (user) {
                        currentUser = user;
                        return true;
                    }
                }
                return false;
            } catch (e) {
                console.error('Load user error:', e);
                return false;
            }
        }

        async function checkAuth() {
            if (!supabaseClient) {
                console.error('❌ Supabase not initialized!');
                showToast('⚠️ System not ready. Please refresh.');
                return false;
            }

            const isLoggedIn = await loadCurrentUser();

            if (!isLoggedIn || !currentUser) {
                console.log('🔒 Not logged in, redirecting to /auth');
                window.location.href = '/auth';
                return false;
            }

            return true;
        }

        // ============================================================
        // 7. UBAH PASSWORD
        // ============================================================
        document.getElementById('changePasswordBtn').addEventListener('click', async function() {
            const current = document.getElementById('currentPassword').value.trim();
            const newPass = document.getElementById('newPassword').value.trim();
            const confirm = document.getElementById('confirmPassword').value.trim();
            const result = document.getElementById('passwordResult');

            // Reset result
            result.className = 'password-result';
            result.style.display = 'none';

            if (!supabaseClient) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> System error. Please refresh.';
                result.style.display = 'block';
                return;
            }

            if (!currentUser) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please login first.';
                result.style.display = 'block';
                return;
            }

            // Validasi
            if (!current) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter current password.';
                result.style.display = 'block';
                return;
            }

            if (newPass.length < 4) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> New password must be at least 4 characters.';
                result.style.display = 'block';
                return;
            }

            if (newPass !== confirm) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match.';
                result.style.display = 'block';
                return;
            }

            // Cek password saat ini - login dengan password saat ini
            try {
                const user = await getUserByEmail(currentUser.email);
                if (!user) {
                    result.className = 'password-result error';
                    result.innerHTML = '<i class="fas fa-exclamation-circle"></i> User not found.';
                    result.style.display = 'block';
                    return;
                }

                // Hash password untuk verifikasi
                const hashed = btoa(current + 'silverchain_salt_2026');
                if (user.password !== hashed) {
                    result.className = 'password-result error';
                    result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Current password is incorrect.';
                    result.style.display = 'block';
                    return;
                }
            } catch (err) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Error verifying password.';
                result.style.display = 'block';
                return;
            }

            // Update password
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                const newHashed = btoa(newPass + 'silverchain_salt_2026');
                const { error } = await supabaseClient
                    .from('users')
                    .update({
                        password: newHashed,
                        updated_at: new Date().toISOString()
                    })
                    .eq('email', currentUser.email);

                if (error) throw error;

                // Bersihkan form
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                result.className = 'password-result success';
                result.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Password changed successfully!';
                result.style.display = 'block';

                showToast('✅ Password changed successfully!');

                setTimeout(() => {
                    result.style.display = 'none';
                }, 5000);

            } catch (err) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (err.message || 'Failed to change password.');
                result.style.display = 'block';
                showToast('❌ ' + (err.message || 'Failed to change password'));
            }

            this.disabled = false;
            this.innerHTML = '<i class="fas fa-save"></i> Change Password';
        });

        // Enter key support untuk form password
        document.getElementById('currentPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('newPassword').focus();
        });
        document.getElementById('newPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('confirmPassword').focus();
        });
        document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('changePasswordBtn').click();
        });

        // ============================================================
        // 8. UI UPDATE
        // ============================================================
        async function updateUI() {
            if (!supabaseClient) {
                console.warn('⏳ Waiting for Supabase...');
                setTimeout(updateUI, 1000);
                return;
            }

            if (!currentUser) {
                document.getElementById('profileName').textContent = '-';
                document.getElementById('profileEmail').textContent = 'Please login first';
                document.getElementById('saldoPersonal').textContent = '0';
                document.getElementById('saldoReferral').textContent = '0';
                document.getElementById('infoEmail').textContent = '-';
                document.getElementById('infoRefCode').textContent = '-';
                document.getElementById('infoRefLink').textContent = '-';
                document.getElementById('infoRole').textContent = '-';
                document.getElementById('adminPanelBtn').style.display = 'none';
                document.getElementById('changePasswordBtn').disabled = true;
                document.getElementById('downlineBody').innerHTML =
                    `<tr><td colspan="5" class="empty">Please login first</td></tr>`;
                document.getElementById('downlineTotal').textContent = '0';
                document.getElementById('downlineActive').textContent = '0';
                document.getElementById('downlineEarnings').textContent = '0';
                return;
            }

            document.getElementById('changePasswordBtn').disabled = false;

            const user = await getUserByEmail(currentUser.email);
            if (!user) return;

            document.getElementById('profileName').textContent = currentUser.email.split('@')[0];
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('infoEmail').textContent = currentUser.email;
            document.getElementById('infoRefCode').textContent = user.ref_code || '-';

            const domain = window.location.host;
            document.getElementById('infoRefLink').textContent = `https://${domain}/?ref=${user.ref_code || ''}`;

            const isAdmin = user.role === 'admin';
            document.getElementById('infoRole').textContent = isAdmin ? '👑 Admin' : 'Member';
            document.getElementById('adminPanelBtn').style.display = isAdmin ? 'block' : 'none';

            // Saldo
            const personalBalance = await getPersonalBalance(currentUser.email);
            const referralBalance = await getReferralBalance(currentUser.email);
            document.getElementById('saldoPersonal').textContent = personalBalance.toFixed(1);
            document.getElementById('saldoReferral').textContent = referralBalance.toFixed(1);

            // ===== DOWNLINE =====
            const downline = await getDownline(user.ref_code);
            const totalReferrals = downline.length;
            const activeReferrals = downline.filter(d => d.verified === true).length;

            // Hitung total earnings dari downline
            let totalEarnings = 0;
            const refPercent = parseInt(await getSetting('ref_percent')) || 3;
            for (const ref of downline) {
                const deposits = await getUserDeposits(ref.email);
                const firstDeposit = deposits
                    .filter(d => d.status === 'approved')
                    .sort((a, b) => a.timestamp - b.timestamp)[0];
                if (firstDeposit) {
                    totalEarnings += firstDeposit.usdt * refPercent / 100;
                }
            }
            // Kurangi withdraw
            const wdHistory = await getUserWithdrawals(currentUser.email);
            const totalWd = wdHistory
                .filter(w => w.status === 'approved')
                .reduce((sum, w) => sum + w.amount, 0);
            totalEarnings = Math.round((totalEarnings - totalWd) * 100) / 100;

            document.getElementById('downlineTotal').textContent = totalReferrals;
            document.getElementById('downlineActive').textContent = activeReferrals;
            document.getElementById('downlineEarnings').textContent = totalEarnings.toFixed(1);

            // Downline Table
            if (downline.length === 0) {
                document.getElementById('downlineBody').innerHTML =
                    `<tr><td colspan="5" class="empty">No referrals yet</td></tr>`;
            } else {
                let html = '';
                downline.forEach((d, index) => {
                    const joined = new Date(d.created_at).toLocaleDateString('en-US');
                    const status = d.verified ? '✅ Active' : '⏳ Pending';
                    // Cari kontribusi user ini
                    let contribution = '0 USDT';
                    const deposits = depositsDB ? depositsDB.filter(dep => dep.email === d.email && dep.status ===
                        'approved') : [];
                    const firstDeposit = deposits.length > 0 ? deposits.sort((a, b) => a.timestamp - b.timestamp)[0] :
                        null;
                    if (firstDeposit) {
                        contribution = (firstDeposit.usdt * refPercent / 100).toFixed(1) + ' USDT';
                    }
                    html += `<tr>
                        <td>${index + 1}</td>
                        <td style="font-size:0.7rem;">${d.email}</td>
                        <td>${joined}</td>
                        <td>${status}</td>
                        <td>${contribution}</td>
                    </tr>`;
                });
                document.getElementById('downlineBody').innerHTML = html;
            }
        }

        // ============================================================
        // 9. LOGOUT
        // ============================================================
        function logout() {
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            currentUser = null;
            updateUI();
            showToast('👋 Logged out successfully.');
            setTimeout(() => { window.location.href = '/'; }, 500);
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        // ============================================================
        // 10. ADMIN PANEL BUTTON
        // ============================================================
        document.getElementById('adminPanelBtn').addEventListener('click', function() {
            window.location.href = '/admin';
        });

        // ============================================================
        // 11. INIT
        // ============================================================
        async function init() {
            console.log('🔄 Account page initializing...');

            if (!supabaseClient) {
                console.error('❌ Supabase not ready!');
                showToast('❌ System not ready. Please refresh.');
                setTimeout(init, 2000);
                return;
            }

            const authPassed = await checkAuth();
            if (!authPassed) return;

            await updateUI();

            console.log('🟢 Account page ready!');
            console.log('👤 User:', currentUser.email);
            console.log('📌 Downline system connected to Supabase');
        }

        // Start
        init();

        // Auto refresh every 10 seconds
        setInterval(async () => {
            if (currentUser) {
                await updateUI();
            }
        }, 10000);

        console.log('🟢 SilverChain Account Page ready.');
        console.log('📌 Supabase URL:', SUPABASE_URL);
        console.log('📌 Downline data from Supabase');
    </script>
</body>
