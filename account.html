<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>SilverChain · Akun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        /* ===== SAMA SEPERTI SEBELUMNYA ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            padding: 1.5rem 1rem 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1050px;
            width: 100%;
        }
        .section-card {
            background: rgba(18, 34, 72, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            padding: 2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(100, 140, 220, 0.15);
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        .badge-silver {
            background: rgba(60, 120, 255, 0.06);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.25rem 1rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #c0c0c0;
        }
        .badge-success {
            background: rgba(60, 220, 80, 0.1);
            border: 1px solid rgba(60, 220, 80, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #6aff8a;
        }
        .badge-warning {
            background: rgba(250, 200, 60, 0.1);
            border: 1px solid rgba(250, 200, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #fbbf24;
        }
        .badge-danger {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #ff6a6a;
        }
        .owner-badge {
            background: rgba(255, 200, 60, 0.1);
            border: 1px solid rgba(255, 200, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.6rem;
            color: #fcd34d;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #c0c0c0, #888888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 30px rgba(192, 192, 192, 0.15);
        }
        .profile-name {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #e0e0e0;
        }
        .profile-email {
            text-align: center;
            color: #c0c0c0;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* SALDO GRID */
        .saldo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .saldo-card {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .saldo-card .label {
            font-size: 0.65rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .saldo-card .amount {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e0e0e0;
            margin: 0.2rem 0;
        }
        .saldo-card .amount.referral {
            color: #c0c0c0;
        }
        .saldo-card .sub {
            font-size: 0.6rem;
            color: #a0a0a0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(80, 140, 255, 0.06);
        }
        .info-row .label {
            color: #c0c0c0;
            font-size: 0.85rem;
        }
        .info-row .value {
            color: #e0e0e0;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .info-row .value code {
            background: rgba(8, 20, 48, 0.3);
            padding: 0.1rem 0.6rem;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #c0c0c0;
        }

        .btn-danger {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.2);
            border-radius: 60px;
            padding: 0.7rem 2rem;
            color: #ff6a6a;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-danger:hover {
            background: rgba(255, 60, 60, 0.2);
        }
        .btn-danger i {
            margin-right: 8px;
        }
        .btn-admin {
            background: rgba(60, 120, 255, 0.1);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            color: #c0c0c0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: none;
        }
        .btn-admin:hover {
            background: rgba(60, 120, 255, 0.2);
        }
        .btn-admin i {
            margin-right: 8px;
            color: #a0a0a0;
        }

        /* TABLE WD HISTORY */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 0.5rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(80, 140, 255, 0.04);
        }
        .table-wrapper table {
            width: 100%;
            min-width: 500px;
            border-collapse: collapse;
            font-size: 0.75rem;
        }
        .table-wrapper table th {
            text-align: left;
            color: #a0a0a0;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            border-bottom: 1px solid rgba(80, 140, 255, 0.06);
            white-space: nowrap;
        }
        .table-wrapper table td {
            padding: 0.4rem 0.8rem;
            color: #c0c0c0;
            border-bottom: 1px solid rgba(80, 140, 255, 0.03);
            white-space: nowrap;
        }
        .table-wrapper table .empty {
            color: #a0a0a0;
            text-align: center;
            padding: 1.5rem 0;
        }
        .status-pending {
            color: #fbbf24;
        }
        .status-approved {
            color: #6aff8a;
        }
        .status-rejected {
            color: #ff6a6a;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(12, 28, 60, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(80, 140, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.4rem 0 0.6rem;
            z-index: 100;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
        }
        .bottom-nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.55rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: 0.2s;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            min-width: 60px;
            position: relative;
        }
        .bottom-nav a i {
            font-size: 1.3rem;
        }
        .bottom-nav a span {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .bottom-nav a.active {
            color: #e0e0e0;
        }
        .bottom-nav a.active i {
            color: #c0c0c0;
            text-shadow: 0 0 25px rgba(192, 192, 192, 0.15);
        }
        .bottom-nav a:hover {
            color: #e8e8e8;
        }

        .toast-message {
            background: rgba(12, 28, 60, 0.8);
            backdrop-filter: blur(8px);
            border-left: 4px solid #c0c0c0;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-size: 0.85rem;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }
        .toast-message.show {
            display: flex;
        }

        /* Footer Copyright */
        .footer-copyright {
            text-align: center;
            color: #888888;
            font-size: 0.7rem;
            padding: 1rem 0 0.5rem;
            border-top: 1px solid rgba(80, 140, 255, 0.05);
            margin-top: 1rem;
        }

        @media (max-width: 700px) {
            .saldo-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 480px) {
            .section-card {
                padding: 1.5rem 1rem;
            }
            .saldo-grid {
                grid-template-columns: 1fr;
            }
            .bottom-nav a {
                font-size: 0.5rem;
                padding: 0.1rem 0.3rem;
                min-width: 45px;
            }
            .bottom-nav a i {
                font-size: 1.1rem;
            }
            .bottom-nav a span {
                font-size: 0.5rem;
            }
            .info-row {
                flex-direction: column;
                gap: 0.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div id="toastMessage" class="toast-message"><i class="fas fa-check-circle"></i> <span id="toastText">Berhasil</span></div>

        <!-- PROFIL -->
        <div class="section-card">
            <div class="profile-avatar" id="profileAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-name" id="profileName">-</div>
            <div class="profile-email" id="profileEmail">-</div>

            <!-- SALDO -->
            <div class="saldo-grid">
                <div class="saldo-card">
                    <div class="label">💰 Saldo Pribadi</div>
                    <div class="amount" id="saldoPersonal">0</div>
                    <div class="sub">USDT</div>
                </div>
                <div class="saldo-card">
                    <div class="label">💎 Saldo Referral</div>
                    <div class="amount referral" id="saldoReferral">0</div>
                    <div class="sub">USDT — <span style="color:#c0c0c0;">Bisa di-withdraw</span></div>
                </div>
            </div>

            <!-- INFO AKUN -->
            <div style="margin:0.5rem 0;">
                <div class="info-row">
                    <span class="label"><i class="fas fa-envelope"></i> Email</span>
                    <span class="value" id="infoEmail">-</span>
                </div>
                <div class="info-row">
                    <span class="label"><i class="fas fa-code"></i> Kode Referral</span>
                    <span class="value"><code id="infoRefCode">-</code></span>
                </div>
                <div class="info-row">
                    <span class="label"><i class="fas fa-link"></i> Link Referral</span>
                    <span class="value" style="font-size:0.7rem; font-family:monospace; word-break:break-all;" id="infoRefLink">-</span>
                </div>
                <div class="info-row">
                    <span class="label"><i class="fas fa-user-tag"></i> Role</span>
                    <span class="value" id="infoRole">Member</span>
                </div>
            </div>

            <!-- RIWAYAT WITHDRAW -->
            <div style="margin-top:1.5rem;">
                <h4 style="color:#e0e0e0; margin-bottom:0.5rem;"><i class="fas fa-clock" style="color:#c0c0c0;"></i> Riwayat Withdraw</h4>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Jumlah</th>
                                <th>Address</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="wdHistoryBody">
                            <tr><td colspan="4" class="empty">Belum ada permintaan withdraw</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TOMBOL ADMIN -->
            <button class="btn-admin" id="adminPanelBtn"><i class="fas fa-user-shield"></i> Panel Admin</button>

            <!-- LOGOUT -->
            <button class="btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>

            <!-- Copyright -->
            <div class="footer-copyright">Copyright 2026</div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="index.html" id="navHome">
            <i class="fas fa-home"></i>
            <span>Beranda</span>
        </a>
        <a href="dashboard.html" id="navBuy">
            <i class="fas fa-shopping-cart"></i>
            <span>Beli Token</span>
        </a>
        <a href="account.html" class="active" id="navAccount">
            <i class="fas fa-user"></i>
            <span>Akun</span>
        </a>
    </nav>

    <script>
        // ============================================================
        // STORAGE KEYS
        // ============================================================
        const STORAGE_KEYS = {
            USERS: 'silverchain_users',
            DEPOSITS: 'silverchain_deposits',
            WITHDRAWALS: 'silverchain_withdrawals',
            BONUS: 'silverchain_bonus',
            REF: 'silverchain_ref',
            CURRENT_USER: 'silverchain_current_user',
            SETTINGS: 'silverchain_settings'
        };
        const OWNER_EMAIL = 'admin@silverchain.io';
        const MIN_WITHDRAW = 10;

        let usersDB = [];
        let depositsDB = [];
        let withdrawalsDB = [];
        let currentUser = null;
        let refPercent = 3;
        let settings = {};

        // ============================================================
        // LOAD
        // ============================================================
        function loadData() {
            try {
                const users = localStorage.getItem(STORAGE_KEYS.USERS);
                if (users) usersDB = JSON.parse(users);
                const deposits = localStorage.getItem(STORAGE_KEYS.DEPOSITS);
                if (deposits) depositsDB = JSON.parse(deposits);
                const wd = localStorage.getItem(STORAGE_KEYS.WITHDRAWALS);
                if (wd) withdrawalsDB = JSON.parse(wd);
                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (saved) {
                    const data = JSON.parse(saved);
                    const found = usersDB.find(u => u.email === data.email);
                    if (found) currentUser = found;
                }
                const ref = localStorage.getItem(STORAGE_KEYS.REF);
                if (ref) refPercent = parseInt(ref) || 3;
                
                const settingsData = localStorage.getItem(STORAGE_KEYS.SETTINGS);
                if (settingsData) settings = JSON.parse(settingsData);
                else settings = {};
            } catch (e) { console.warn('Load error:', e); }
        }

        function findUser(email) { return usersDB.find(u => u.email.toLowerCase() === email.toLowerCase()); }

        // ===== SALDO FUNGSI =====
        function getSaldoPersonal(email) {
            const deposits = depositsDB.filter(d => d.email === email && d.status === 'approved');
            return deposits.reduce((sum, d) => sum + (d.usdt + (d.bonus || 0)), 0);
        }

        function getSaldoReferral(email) {
            const user = findUser(email);
            if (!user) return 0;
            const referrals = usersDB.filter(u => u.referredBy === user.refCode);
            let total = 0;
            referrals.forEach(ref => {
                const firstDeposit = depositsDB
                    .filter(d => d.email === ref.email && d.status === 'approved')
                    .sort((a, b) => a.timestamp - b.timestamp)[0];
                if (firstDeposit) {
                    total += firstDeposit.usdt * refPercent / 100;
                }
            });
            const wdHistory = withdrawalsDB.filter(w => w.email === email && w.status === 'approved');
            const totalWd = wdHistory.reduce((sum, w) => sum + w.amount, 0);
            return Math.round((total - totalWd) * 100) / 100;
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // ============================================================
        // UI
        // ============================================================
        function updateUI() {
            const isLoggedIn = !!currentUser;
            const isOwner = isLoggedIn && currentUser.email.toLowerCase() === OWNER_EMAIL.toLowerCase();

            if (!isLoggedIn) {
                document.getElementById('profileName').textContent = '-';
                document.getElementById('profileEmail').textContent = 'Silakan login terlebih dahulu';
                document.getElementById('saldoPersonal').textContent = '0';
                document.getElementById('saldoReferral').textContent = '0';
                document.getElementById('infoEmail').textContent = '-';
                document.getElementById('infoRefCode').textContent = '-';
                document.getElementById('infoRefLink').textContent = '-';
                document.getElementById('infoRole').textContent = '-';
                document.getElementById('adminPanelBtn').style.display = 'none';
                document.getElementById('wdHistoryBody').innerHTML =
                    `<tr><td colspan="4" class="empty">Silakan login terlebih dahulu</td></tr>`;
                return;
            }

            const user = findUser(currentUser.email);
            if (!user) return;

            document.getElementById('profileName').textContent = currentUser.email.split('@')[0];
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('infoEmail').textContent = currentUser.email;
            document.getElementById('infoRefCode').textContent = user.refCode || '-';

            const domain = window.location.host;
            document.getElementById('infoRefLink').textContent = `https://${domain}/?ref=${user.refCode}`;
            document.getElementById('infoRole').textContent = isOwner ? '👑 Owner / Admin' : 'Member';

            document.getElementById('adminPanelBtn').style.display = isOwner ? 'block' : 'none';

            // Saldo
            const saldoPersonal = getSaldoPersonal(currentUser.email);
            const saldoReferral = getSaldoReferral(currentUser.email);
            document.getElementById('saldoPersonal').textContent = saldoPersonal.toFixed(1);
            document.getElementById('saldoReferral').textContent = saldoReferral.toFixed(1);

            // Riwayat WD
            const wdHistory = withdrawalsDB.filter(w => w.email === currentUser.email);
            if (wdHistory.length === 0) {
                document.getElementById('wdHistoryBody').innerHTML =
                    `<tr><td colspan="4" class="empty">Belum ada permintaan withdraw</td></tr>`;
            } else {
                let html = '';
                wdHistory.slice().reverse().forEach(w => {
                    const date = new Date(w.timestamp).toLocaleDateString('id-ID') + ' ' + new Date(w.timestamp)
                        .toLocaleTimeString('id-ID');
                    const cls = w.status === 'approved' ? 'status-approved' : w.status === 'rejected' ?
                        'status-rejected' : 'status-pending';
                    const txt = w.status === 'approved' ? '✅ Disetujui' : w.status === 'rejected' ?
                        '❌ Ditolak' : '⏳ Pending';
                    const addrShort = w.address ? w.address.substring(0, 8) + '...' : '-';
                    html += `<tr>
                        <td>${date}</td>
                        <td>${w.amount} USDT</td>
                        <td style="font-family:monospace; font-size:0.65rem;">${addrShort}</td>
                        <td class="${cls}">${txt}</td>
                    </tr>`;
                });
                document.getElementById('wdHistoryBody').innerHTML = html;
            }
        }

        // ============================================================
        // LOGOUT
        // ============================================================
        function logout() {
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            currentUser = null;
            updateUI();
            showToast('👋 Berhasil keluar.');
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        // ============================================================
        // ADMIN PANEL BUTTON
        // ============================================================
        document.getElementById('adminPanelBtn').addEventListener('click', function() {
            window.location.href = 'admin.html';
        });

        // ============================================================
        // INIT
        // ============================================================
        loadData();
        updateUI();

        setInterval(() => {
            loadData();
            updateUI();
        }, 3000);

        console.log('🟢 SilverChain Account Page siap.');
        console.log('📌 Bonus referral dalam USDT — bisa di-WD');
    </script>
</body>
</html>
