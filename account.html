<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>SilverChain · Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <!-- Supabase SDK & Config -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <script src="supabase-config.js">
    </script>
    <style>
        /* ===== SAMA SEPERTI SEBELUMNYA ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            padding: 1.5rem 1rem 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1050px;
            width: 100%;
        }
        .section-card {
            background: rgba(18, 34, 72, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            padding: 2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(100, 140, 220, 0.15);
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        .badge-silver {
            background: rgba(60, 120, 255, 0.06);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.25rem 1rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #c0c0c0;
        }
        .badge-success {
            background: rgba(60, 220, 80, 0.1);
            border: 1px solid rgba(60, 220, 80, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #6aff8a;
        }
        .badge-warning {
            background: rgba(250, 200, 60, 0.1);
            border: 1px solid rgba(250, 200, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #fbbf24;
        }
        .badge-danger {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.55rem;
            font-weight: 600;
            color: #ff6a6a;
        }
        .owner-badge {
            background: rgba(255, 200, 60, 0.1);
            border: 1px solid rgba(255, 200, 60, 0.15);
            border-radius: 60px;
            padding: 0.15rem 0.6rem;
            font-size: 0.6rem;
            color: #fcd34d;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #c0c0c0, #888888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 30px rgba(192, 192, 192, 0.15);
        }
        .profile-name {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #e0e0e0;
        }
        .profile-email {
            text-align: center;
            color: #c0c0c0;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        /* SALDO GRID */
        .saldo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .saldo-card {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .saldo-card .label {
            font-size: 0.65rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .saldo-card .amount {
            font-size: 1.6rem;
            font-weight: 700;
            color: #e0e0e0;
            margin: 0.2rem 0;
        }
        .saldo-card .amount.referral {
            color: #c0c0c0;
        }
        .saldo-card .sub {
            font-size: 0.6rem;
            color: #a0a0a0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(80, 140, 255, 0.06);
        }
        .info-row .label {
            color: #c0c0c0;
            font-size: 0.85rem;
        }
        .info-row .value {
            color: #e0e0e0;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .info-row .value code {
            background: rgba(8, 20, 48, 0.3);
            padding: 0.1rem 0.6rem;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #c0c0c0;
        }

        /* ===== UBAH PASSWORD ===== */
        .change-password-section {
            margin-top: 1.5rem;
            border-top: 1px solid rgba(80, 140, 255, 0.06);
            padding-top: 1.2rem;
        }
        .change-password-section h4 {
            color: #e0e0e0;
            margin-bottom: 0.8rem;
        }
        .change-password-section h4 i {
            color: #c0c0c0;
            margin-right: 8px;
        }
        .password-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .password-form .input-group {
            flex: 1;
            min-width: 150px;
        }
        .password-form .input-group label {
            display: block;
            color: #a0a0a0;
            font-size: 0.65rem;
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .password-form .input-group input {
            width: 100%;
            background: rgba(8, 20, 48, 0.5);
            border: 1px solid rgba(80, 140, 255, 0.06);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            color: #d4d4d4;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .password-form .input-group input:focus {
            border-color: rgba(80, 140, 255, 0.2);
        }
        .password-form .input-group input::placeholder {
            color: #666666;
        }
        .btn-change-password {
            background: linear-gradient(145deg, #c0c0c0, #888888);
            border: none;
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.6rem;
            align-self: flex-end;
            white-space: nowrap;
        }
        .btn-change-password:hover {
            box-shadow: 0 12px 40px -6px rgba(192, 192, 192, 0.2);
            transform: translateY(-2px);
        }
        .btn-change-password:active {
            transform: scale(0.97);
        }
        .btn-change-password:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .password-result {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: none;
            padding: 0.5rem 1rem;
            border-radius: 60px;
            width: 100%;
        }
        .password-result.success {
            display: block;
            background: rgba(60, 220, 80, 0.1);
            border: 1px solid rgba(60, 220, 80, 0.15);
            color: #6aff8a;
        }
        .password-result.error {
            display: block;
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.15);
            color: #ff6a6a;
        }
        .password-result i {
            margin-right: 8px;
        }

        .btn-danger {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.2);
            border-radius: 60px;
            padding: 0.7rem 2rem;
            color: #ff6a6a;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-danger:hover {
            background: rgba(255, 60, 60, 0.2);
        }
        .btn-danger i {
            margin-right: 8px;
        }
        .btn-admin {
            background: rgba(60, 120, 255, 0.1);
            border: 1px solid rgba(80, 140, 255, 0.1);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            color: #c0c0c0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 0.5rem;
            display: none;
        }
        .btn-admin:hover {
            background: rgba(60, 120, 255, 0.2);
        }
        .btn-admin i {
            margin-right: 8px;
            color: #a0a0a0;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(12, 28, 60, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(80, 140, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.4rem 0 0.6rem;
            z-index: 100;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5);
        }
        .bottom-nav a {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.55rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: 0.2s;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            min-width: 60px;
            position: relative;
        }
        .bottom-nav a i {
            font-size: 1.3rem;
        }
        .bottom-nav a span {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .bottom-nav a.active {
            color: #e0e0e0;
        }
        .bottom-nav a.active i {
            color: #c0c0c0;
            text-shadow: 0 0 25px rgba(192, 192, 192, 0.15);
        }
        .bottom-nav a:hover {
            color: #e8e8e8;
        }

        .toast-message {
            background: rgba(12, 28, 60, 0.8);
            backdrop-filter: blur(8px);
            border-left: 4px solid #c0c0c0;
            border-radius: 40px;
            padding: 0.6rem 1.4rem;
            font-size: 0.85rem;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }
        .toast-message.show {
            display: flex;
        }

        .footer-copyright {
            text-align: center;
            color: #888888;
            font-size: 0.7rem;
            padding: 1rem 0 0.5rem;
            border-top: 1px solid rgba(80, 140, 255, 0.05);
            margin-top: 1rem;
        }

        @media (max-width: 700px) {
            .saldo-grid {
                grid-template-columns: 1fr 1fr;
            }
            .password-form {
                flex-direction: column;
                align-items: stretch;
            }
            .password-form .input-group {
                min-width: 100%;
            }
            .btn-change-password {
                align-self: stretch;
                text-align: center;
            }
        }
        @media (max-width: 480px) {
            .section-card {
                padding: 1.5rem 1rem;
            }
            .saldo-grid {
                grid-template-columns: 1fr;
            }
            .bottom-nav a {
                font-size: 0.5rem;
                padding: 0.1rem 0.3rem;
                min-width: 45px;
            }
            .bottom-nav a i {
                font-size: 1.1rem;
            }
            .bottom-nav a span {
                font-size: 0.5rem;
            }
            .info-row {
                flex-direction: column;
                gap: 0.2rem;
            }
            .password-result {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <div id="toastMessage" class="toast-message"><i class="fas fa-check-circle"></i> <span id="toastText">Success</span></div>

        <!-- PROFIL -->
        <div class="section-card">
            <div class="profile-avatar" id="profileAvatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-name" id="profileName">-</div>
            <div class="profile-email" id="profileEmail">-</div>

            <!-- SALDO -->
            <div class="saldo-grid">
                <div class="saldo-card">
                    <div class="label">💰 Personal Balance</div>
                    <div class="amount" id="saldoPersonal">0</div>
                    <div class="sub">USDT</div>
                </div>
                <div class="saldo-card">
                    <div class="label">💎 Referral Balance</div>
                    <div class="amount referral" id="saldoReferral">0</div>
                    <div class="sub">USDT — <span style="color:#c0c0c0;">Withdrawable</span></div>
                </div>
            </div>

            <!-- INFO AKUN -->
            <div style="margin:0.5rem 0;">
                <div class="info-row">
                    <span class="label"><i class="fas fa-envelope"></i> Email</span>
                    <span class="value" id="infoEmail">-</span>
                </div>
                <div class="info-row">
                    <span class="label"><i class="fas fa-code"></i> Referral Code</span>
                    <span class="value"><code id="infoRefCode">-</code></span>
                </div>
                <div class="info-row">
                    <span class="label"><i class="fas fa-link"></i> Referral Link</span>
                    <span class="value" style="font-size:0.7rem; font-family:monospace; word-break:break-all;" id="infoRefLink">-</span>
                </div>
                <div class="info-row">
                    <span class="label"><i class="fas fa-user-tag"></i> Role</span>
                    <span class="value" id="infoRole">Member</span>
                </div>
            </div>

            <!-- ===== UBAH PASSWORD ===== -->
            <div class="change-password-section">
                <h4><i class="fas fa-key"></i> Change Password</h4>
                <div class="password-form">
                    <div class="input-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" placeholder="Enter current password" />
                    </div>
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" placeholder="Min 4 characters" />
                    </div>
                    <div class="input-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPassword" placeholder="Re-enter new password" />
                    </div>
                    <button class="btn-change-password" id="changePasswordBtn">
                        <i class="fas fa-save"></i> Change Password
                    </button>
                </div>
                <div class="password-result" id="passwordResult"></div>
            </div>

            <!-- TOMBOL ADMIN -->
            <button class="btn-admin" id="adminPanelBtn"><i class="fas fa-user-shield"></i> Admin Panel</button>

            <!-- LOGOUT -->
            <button class="btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>

            <!-- Copyright -->
            <div class="footer-copyright">Copyright 2026</div>
        </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <a href="/" id="navHome">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/dashboard" id="navBuy">
            <i class="fas fa-shopping-cart"></i>
            <span>Buy</span>
        </a>
        <a href="/account" class="active" id="navAccount">
            <i class="fas fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script>
        // ============================================================
        // STORAGE KEYS
        // ============================================================
        const STORAGE_KEYS = {
            CURRENT_USER: 'silverchain_current_user'
        };

        let currentUser = null;

        // ============================================================
        // LOAD
        // ============================================================
        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (typeof Supabase !== 'undefined') {
                        Supabase.getUserByEmail(data.email).then(user => {
                            if (user) currentUser = user;
                            updateUI();
                        });
                    }
                }
            } catch (e) { console.warn('Load error:', e); }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = msg;
            toast.style.display = 'flex';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // ============================================================
        // CHECK SUPABASE
        // ============================================================
        function checkSupabase() {
            if (typeof Supabase === 'undefined') {
                showToast('❌ System error. Please refresh.');
                return false;
            }
            return true;
        }

        // ============================================================
        // UBAH PASSWORD
        // ============================================================
        document.getElementById('changePasswordBtn').addEventListener('click', async function() {
            const current = document.getElementById('currentPassword').value.trim();
            const newPass = document.getElementById('newPassword').value.trim();
            const confirm = document.getElementById('confirmPassword').value.trim();
            const result = document.getElementById('passwordResult');

            // Reset result
            result.className = 'password-result';
            result.style.display = 'none';

            if (!checkSupabase()) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> System error. Please refresh.';
                result.style.display = 'block';
                return;
            }

            if (!currentUser) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please login first.';
                result.style.display = 'block';
                return;
            }

            // Validasi
            if (!current) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter current password.';
                result.style.display = 'block';
                return;
            }

            if (newPass.length < 4) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> New password must be at least 4 characters.';
                result.style.display = 'block';
                return;
            }

            if (newPass !== confirm) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Passwords do not match.';
                result.style.display = 'block';
                return;
            }

            // Cek password saat ini
            try {
                // Login dengan password saat ini untuk verifikasi
                await Supabase.loginUser(currentUser.email, current);
            } catch (err) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> Current password is incorrect.';
                result.style.display = 'block';
                return;
            }

            // Update password
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                await Supabase.updatePassword(currentUser.email, newPass);

                // Bersihkan form
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';

                result.className = 'password-result success';
                result.innerHTML = '<i class="fas fa-check-circle"></i> ✅ Password changed successfully!';
                result.style.display = 'block';

                showToast('✅ Password changed successfully!');

                setTimeout(() => {
                    result.style.display = 'none';
                }, 5000);

            } catch (err) {
                result.className = 'password-result error';
                result.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (err.message || 'Failed to change password.');
                result.style.display = 'block';
                showToast('❌ ' + (err.message || 'Failed to change password'));
            }

            this.disabled = false;
            this.innerHTML = '<i class="fas fa-save"></i> Change Password';
        });

        // Enter key support untuk form password
        document.getElementById('currentPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('newPassword').focus();
        });
        document.getElementById('newPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('confirmPassword').focus();
        });
        document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('changePasswordBtn').click();
        });

        // ============================================================
        // UI
        // ============================================================
        async function updateUI() {
            const isLoggedIn = !!currentUser;

            if (!isLoggedIn) {
                document.getElementById('profileName').textContent = '-';
                document.getElementById('profileEmail').textContent = 'Please login first';
                document.getElementById('saldoPersonal').textContent = '0';
                document.getElementById('saldoReferral').textContent = '0';
                document.getElementById('infoEmail').textContent = '-';
                document.getElementById('infoRefCode').textContent = '-';
                document.getElementById('infoRefLink').textContent = '-';
                document.getElementById('infoRole').textContent = '-';
                document.getElementById('adminPanelBtn').style.display = 'none';
                document.getElementById('changePasswordBtn').disabled = true;
                return;
            }

            document.getElementById('changePasswordBtn').disabled = false;

            document.getElementById('profileName').textContent = currentUser.email.split('@')[0];
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('infoEmail').textContent = currentUser.email;
            document.getElementById('infoRefCode').textContent = currentUser.ref_code || '-';

            const domain = window.location.host;
            document.getElementById('infoRefLink').textContent = `https://${domain}/?ref=${currentUser.ref_code || ''}`;

            if (checkSupabase()) {
                const isAdmin = await Supabase.isAdmin(currentUser.email);
                document.getElementById('infoRole').textContent = isAdmin ? '👑 Admin' : 'Member';
                document.getElementById('adminPanelBtn').style.display = isAdmin ? 'block' : 'none';

                const personalBalance = await Supabase.getPersonalBalance(currentUser.email);
                const referralBalance = await Supabase.getReferralBalance(currentUser.email);
                document.getElementById('saldoPersonal').textContent = personalBalance.toFixed(1);
                document.getElementById('saldoReferral').textContent = referralBalance.toFixed(1);
            }
        }

        // ============================================================
        // LOGOUT
        // ============================================================
        function logout() {
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            currentUser = null;
            updateUI();
            showToast('👋 Logged out successfully.');
            setTimeout(() => { window.location.href = '/'; }, 500);
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);

        // ============================================================
        // ADMIN PANEL BUTTON
        // ============================================================
        document.getElementById('adminPanelBtn').addEventListener('click', function() {
            window.location.href = '/admin';
        });

        // ============================================================
        // CHECK SUPABASE CONFIG ON LOAD
        // ============================================================
        function checkConfigOnLoad() {
            setTimeout(() => {
                if (typeof Supabase === 'undefined') {
                    console.error('❌ Supabase config not loaded!');
                    showToast('⚠️ Config not loaded. Please refresh.');
                } else {
                    console.log('✅ Supabase config loaded!');
                }
            }, 1000);
        }

        // ============================================================
        // INIT
        // ============================================================
        loadData();
        setTimeout(updateUI, 500);
        checkConfigOnLoad();
