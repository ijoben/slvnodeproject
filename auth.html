<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>SilverChain · Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem 1rem;
        }
        .auth-container {
            max-width: 440px;
            width: 100%;
        }
        .auth-card {
            background: rgba(18, 34, 72, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.8rem;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(100, 140, 220, 0.15);
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .auth-logo .logo-icon {
            font-size: 4rem;
            background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }
        .auth-logo h1 {
            color: #e0e0e0;
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 0.2rem;
        }
        .auth-logo p {
            color: #a0a0a0;
            font-size: 0.85rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.3rem;
            background: rgba(8, 20, 48, 0.4);
            border-radius: 60px;
            padding: 0.25rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .auth-tab {
            flex: 1;
            padding: 0.6rem 0.5rem;
            border: none;
            border-radius: 60px;
            background: transparent;
            color: #a0a0a0;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
        }
        .auth-tab.active {
            background: rgba(60, 120, 255, 0.12);
            color: #e0e0e0;
            box-shadow: inset 0 0 20px rgba(60, 120, 255, 0.05);
        }
        .auth-tab:hover:not(.active) {
            color: #c0c0c0;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 0.3rem;
        }
        .form-group label .required {
            color: #ff6a6a;
            margin-left: 2px;
        }
        .form-group .input-wrap {
            display: flex;
            align-items: center;
            background: rgba(8, 20, 48, 0.5);
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.06);
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
            transition: border-color 0.2s;
        }
        .form-group .input-wrap:focus-within {
            border-color: rgba(80, 140, 255, 0.2);
        }
        .form-group .input-wrap i {
            color: #666666;
            font-size: 1rem;
            margin-right: 0.6rem;
            flex-shrink: 0;
        }
        .form-group .input-wrap input {
            background: transparent;
            border: none;
            padding: 0.75rem 0;
            font-size: 0.95rem;
            color: #d4d4d4;
            width: 100%;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrap input::placeholder {
            color: #555555;
            font-weight: 400;
        }
        .form-group .input-wrap .toggle-pw {
            background: none;
            border: none;
            color: #666666;
            padding: 0 1rem;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .form-group .input-wrap .toggle-pw:hover {
            color: #a0a0a0;
        }
        .form-group .input-wrap .password-strength {
            font-size: 0.6rem;
            padding: 0.15rem 0.6rem;
            border-radius: 60px;
            margin-right: 0.5rem;
            display: none;
            flex-shrink: 0;
        }
        .form-group .input-wrap .password-strength.weak {
            display: inline-block;
            background: rgba(255, 60, 60, 0.15);
            color: #ff6a6a;
            border: 1px solid rgba(255, 60, 60, 0.15);
        }
        .form-group .input-wrap .password-strength.medium {
            display: inline-block;
            background: rgba(255, 200, 60, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(255, 200, 60, 0.15);
        }
        .form-group .input-wrap .password-strength.strong {
            display: inline-block;
            background: rgba(60, 220, 80, 0.15);
            color: #6aff8a;
            border: 1px solid rgba(60, 220, 80, 0.15);
        }

        .form-group .ref-input {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            color: #a0a0a0;
            border: 1px solid rgba(80, 140, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .form-group .ref-input i {
            color: #666666;
        }
        .form-group .ref-input .ref-label {
            color: #a0a0a0;
            font-size: 0.8rem;
        }
        .form-group .ref-input input {
            background: transparent;
            border: none;
            color: #d4d4d4;
            padding: 0.2rem 0.4rem;
            outline: none;
            font-size: 0.85rem;
            flex: 1;
            min-width: 80px;
            font-family: monospace;
            text-transform: uppercase;
        }
        .form-group .ref-input input::placeholder {
            color: #555555;
            text-transform: none;
        }
        .form-group .ref-input .ref-status {
            font-size: 0.65rem;
            padding: 0.15rem 0.6rem;
            border-radius: 60px;
            display: none;
        }
        .form-group .ref-input .ref-status.valid {
            display: inline-block;
            background: rgba(60, 220, 80, 0.1);
            color: #6aff8a;
            border: 1px solid rgba(60, 220, 80, 0.15);
        }
        .form-group .ref-input .ref-status.invalid {
            display: inline-block;
            background: rgba(255, 60, 60, 0.1);
            color: #ff6a6a;
            border: 1px solid rgba(255, 60, 60, 0.15);
        }
        .form-group .ref-input .ref-status.checking {
            display: inline-block;
            background: rgba(60, 120, 255, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(60, 120, 255, 0.15);
        }
        .form-group .ref-input .ref-status.filled {
            display: inline-block;
            background: rgba(60, 120, 255, 0.08);
            color: #60a5fa;
            border: 1px solid rgba(60, 120, 255, 0.12);
        }

        .info-banner {
            background: rgba(60, 120, 255, 0.05);
            border: 1px solid rgba(80, 140, 255, 0.08);
            border-radius: 0.8rem;
            padding: 0.5rem 0.8rem;
            font-size: 0.75rem;
            color: #a0a0a0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: -0.3rem;
        }
        .info-banner i {
            color: #60a5fa;
            font-size: 0.9rem;
        }

        .btn-submit {
            background: linear-gradient(145deg, #c0c0c0, #888888);
            border: none;
            border-radius: 60px;
            padding: 0.85rem;
            font-weight: 700;
            font-size: 1rem;
            color: #0a1228;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.3rem;
            box-shadow: 0 8px 30px -6px rgba(192, 192, 192, 0.1);
        }
        .btn-submit:hover {
            box-shadow: 0 12px 40px -6px rgba(192, 192, 192, 0.2);
            transform: translateY(-2px);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-back {
            background: rgba(60, 120, 255, 0.06);
            border: 1px solid rgba(80, 140, 255, 0.06);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            color: #a0a0a0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
            border: none;
            margin-top: 0.5rem;
        }
        .btn-back:hover {
            background: rgba(60, 120, 255, 0.12);
            color: #c0c0c0;
        }

        .result-msg {
            display: none;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.3rem;
        }
        .result-msg.success {
            display: block;
            background: rgba(60, 220, 80, 0.08);
            border: 1px solid rgba(60, 220, 80, 0.12);
            color: #6aff8a;
        }
        .result-msg.error {
            display: block;
            background: rgba(255, 60, 60, 0.08);
            border: 1px solid rgba(255, 60, 60, 0.12);
            color: #ff6a6a;
        }
        .result-msg.info {
            display: block;
            background: rgba(60, 120, 255, 0.08);
            border: 1px solid rgba(60, 120, 255, 0.12);
            color: #60a5fa;
        }
        .result-msg i {
            margin-right: 6px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(80, 140, 255, 0.05);
            color: #888888;
            font-size: 0.7rem;
        }

        /* ===== REFERRAL CODE AUTO-FILL HIGHLIGHT ===== */
        .ref-input.highlight {
            border-color: rgba(60, 120, 255, 0.3) !important;
            background: rgba(60, 120, 255, 0.05) !important;
            transition: all 0.5s ease;
        }
        .ref-input.highlight input {
            color: #60a5fa !important;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.8rem 1.2rem 1.5rem;
                border-radius: 2rem;
            }
            .auth-logo .logo-icon {
                font-size: 3rem;
            }
            .auth-logo h1 {
                font-size: 1.3rem;
            }
            .auth-tab {
                font-size: 0.8rem;
                padding: 0.5rem 0.3rem;
            }
            .form-group .input-wrap input {
                font-size: 0.85rem;
                padding: 0.6rem 0;
            }
            .form-group .input-wrap {
                padding-left: 0.8rem;
            }
            .btn-submit {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
            .form-group .ref-input {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }
            .form-group .ref-input input {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 360px) {
            .auth-card {
                padding: 1.2rem 0.8rem 1rem;
                border-radius: 1.5rem;
            }
            .auth-tab {
                font-size: 0.7rem;
                padding: 0.4rem 0.2rem;
            }
            .form-group .input-wrap input {
                font-size: 0.8rem;
                padding: 0.5rem 0;
            }
            .form-group .input-wrap {
                padding-left: 0.6rem;
            }
            .form-group .input-wrap i {
                font-size: 0.8rem;
                margin-right: 0.4rem;
            }
            .btn-submit {
                font-size: 0.8rem;
                padding: 0.6rem;
            }
            .form-group .ref-input {
                padding: 0.3rem 0.6rem;
                font-size: 0.65rem;
            }
            .form-group .ref-input input {
                font-size: 0.65rem;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                <span class="logo-icon"><i class="fas fa-coins"></i></span>
                <h1>SilverChain</h1>
                <p>DAO Prelaunch</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form class="auth-form active" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
                <div class="result-msg" id="loginResult"></div>
                <button type="button" class="btn-back" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</button>
            </form>

            <!-- ===== REGISTER FORM ===== -->
            <form class="auth-form" id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="registerEmail" placeholder="you@example.com" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6" />
                        <span class="password-strength" id="passwordStrength"></span>
                        <button type="button" class="toggle-pw" onclick="togglePassword('registerPassword', this)"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="info-banner">
                        <i class="fas fa-info-circle"></i>
                        <span>Password must be at least 6 characters</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="registerConfirmPassword" placeholder="Re-enter your password" required minlength="6" />
                        <button type="button" class="toggle-pw" onclick="togglePassword('registerConfirmPassword', this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Referral Code</label>
                    <div class="ref-input" id="refInputWrapper">
                        <i class="fas fa-link"></i>
                        <span class="ref-label">Code:</span>
                        <input type="text" id="registerRefCode" placeholder="ABC123" maxlength="8" spellcheck="false" />
                        <span class="ref-status" id="refStatus"></span>
                    </div>
                    <div class="info-banner" id="refInfoBanner">
                        <i class="fas fa-user-plus"></i>
                        <span id="refInfoText">Masukkan referral code dari upline Anda (opsional)</span>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="registerBtn"><i class="fas fa-user-plus"></i> Create Account</button>
                <div class="result-msg" id="registerResult"></div>
                <button type="button" class="btn-back" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</button>
            </form>

            <div class="auth-footer">
                <span>SilverChain DAO &copy; 2026</span>
            </div>

        </div>

    </div>

    <script>
        // ============================================================
        //  SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyYnJpYXNnbXhqenZidWtzbGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzAxODMsImV4cCI6MjA5OTYwNjE4M30.fhcSgXY-D-AvgDyg86v7eA_ltAU_UC0LFrCDnsJufgg';
        const STORAGE_KEYS = { CURRENT_USER: 'silverchain_current_user' };
        const ADMIN_EMAIL = 'admin@silverchain.io';
        const MIN_PASSWORD_LENGTH = 6;

        let supabaseClient = null;
        let refCheckTimeout = null;
        let isReferralAutoFilled = false;

        // ============================================================
        //  INIT SUPABASE
        // ============================================================
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created!');
        } catch (err) {
            console.error('❌ Supabase error:', err);
        }

        // ============================================================
        //  HELPERS
        // ============================================================
        function generateRefCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function hashPassword(password) {
            return btoa(password + 'silverchain_salt_2026');
        }

        function showResult(id, msg, type = 'info') {
            const el = document.getElementById(id);
            el.className = 'result-msg ' + type;
            el.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
            el.style.display = 'block';
        }

        function hideResult(id) {
            const el = document.getElementById(id);
            el.className = 'result-msg';
            el.style.display = 'none';
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function redirectUser(user) {
            if (!user) return;
            
            console.log(`👤 User role: ${user.role}`);
            
            if (user.role === 'admin') {
                console.log('🔐 Admin detected, redirecting to /admin');
                window.location.href = '/admin';
                return;
            }
            
            console.log('👤 Regular user, redirecting to /dashboard');
            window.location.href = '/dashboard';
        }

        // ============================================================
        //  PASSWORD STRENGTH
        // ============================================================
        function checkPasswordStrength(password) {
            if (!password || password.length === 0) return { label: '', class: '' };
            
            if (password.length < 6) {
                return { label: 'Too short', class: 'weak' };
            }
            
            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            if (score <= 2) return { label: 'Weak', class: 'weak' };
            if (score <= 4) return { label: 'Medium', class: 'medium' };
            return { label: 'Strong', class: 'strong' };
        }

        // ============================================================
        //  SUPABASE FUNCTIONS
        // ============================================================
        async function getUserByEmail(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();
                if (error && error.code === 'PGRST116') return null;
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Get user error:', error);
                return null;
            }
        }

        async function checkReferralCode(refCode) {
            if (!refCode || refCode.trim() === '') {
                return { valid: false, exists: false, code: null };
            }

            const cleanCode = refCode.trim().toUpperCase();
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('ref_code, email')
                    .eq('ref_code', cleanCode)
                    .maybeSingle();

                if (error) throw error;
                
                if (data) {
                    console.log(`✅ Referral code ${cleanCode} found for user: ${data.email}`);
                    return { valid: true, exists: true, code: data.ref_code, email: data.email };
                } else {
                    console.log(`❌ Referral code ${cleanCode} not found`);
                    return { valid: false, exists: false, code: null };
                }
            } catch (error) {
                console.error('Check referral error:', error);
                return { valid: false, exists: false, code: null, error: error.message };
            }
        }

        // ============================================================
        //  CREATE USER
        // ============================================================
        async function createUser(email, password, refCode = null) {
            try {
                const existing = await getUserByEmail(email);
                if (existing) {
                    throw new Error('Email already registered. Please login.');
                }

                const newRefCode = generateRefCode();
                const hashedPassword = hashPassword(password);

                let referredBy = null;
                let referrerEmail = null;
                const cleanRefCode = refCode ? refCode.trim().toUpperCase() : '';

                if (cleanRefCode !== '') {
                    const check = await checkReferralCode(cleanRefCode);
                    
                    if (check.valid && check.exists) {
                        referredBy = check.code;
                        referrerEmail = check.email;
                        console.log(`✅ Referral code ${cleanRefCode} valid!`);
                        console.log(`📌 Upline: ${referrerEmail} (ref_code: ${referredBy})`);
                    } else {
                        throw new Error(`Invalid referral code: "${cleanRefCode}". Silahkan cek kembali.`);
                    }
                } else {
                    console.log('ℹ️ No referral code provided. referred_by will be null.');
                }

                const userRole = email === ADMIN_EMAIL ? 'admin' : 'user';

                console.log(`📝 Creating user: ${email}`);
                console.log(`🔑 New ref_code: ${newRefCode}`);
                console.log(`👥 Referred by: ${referredBy || 'none'}`);

                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        email: email,
                        password: hashedPassword,
                        ref_code: newRefCode,
                        referred_by: referredBy,
                        verified: false,
                        role: userRole,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (error) {
                    if (error.code === '23505') {
                        throw new Error('Email already registered. Please login.');
                    }
                    console.error('Insert error:', error);
                    throw new Error('Failed to create account: ' + error.message);
                }

                console.log(`✅ User created successfully!`);
                console.log(`📧 Email: ${email}`);
                console.log(`🔑 Ref Code: ${newRefCode}`);
                console.log(`👥 Referred By: ${referredBy || 'none'}`);

                return data;

            } catch (error) {
                console.error('Create user error:', error);
                throw error;
            }
        }

        async function loginUser(email, password) {
            try {
                const user = await getUserByEmail(email);
                if (!user) {
                    throw new Error('Account not found. Please register first.');
                }

                const hashed = hashPassword(password);
                if (user.password !== hashed) {
                    throw new Error('Invalid password. Please try again.');
                }

                return user;
            } catch (error) {
                console.error('Login error:', error);
                throw error;
            }
        }

        // ============================================================
        //  REFERRAL AUTO-FILL FROM URL - FIXED!
        // ============================================================
        function autoFillReferralCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            
            console.log(`🔍 Checking URL for referral code: ${ref}`);
            
            if (!ref) {
                console.log('ℹ️ No referral code found in URL');
                return false;
            }

            const refInput = document.getElementById('registerRefCode');
            const refStatus = document.getElementById('refStatus');
            const refWrapper = document.getElementById('refInputWrapper');
            const refInfoText = document.getElementById('refInfoText');
            
            if (!refInput) {
                console.error('❌ Referral input not found!');
                return false;
            }

            // Set value
            const cleanRef = ref.trim().toUpperCase();
            refInput.value = cleanRef;
            
            // Show status
            refStatus.className = 'ref-status filled';
            refStatus.textContent = '📎 Auto-filled from link';
            
            // Highlight wrapper
            refWrapper.classList.add('highlight');
            
            // Update info banner
            if (refInfoText) {
                refInfoText.innerHTML = `✅ Referral code <strong>${cleanRef}</strong> auto-filled from link!`;
            }
            
            isReferralAutoFilled = true;
            
            console.log(`✅ Referral code auto-filled: ${cleanRef}`);
            
            // Switch to register tab
            const registerTab = document.querySelector('.auth-tab[data-tab="register"]');
            if (registerTab) {
                registerTab.click();
            }
            
            // Validate after a moment
            setTimeout(() => {
                validateReferralCode(cleanRef);
            }, 800);
            
            return true;
        }

        // ============================================================
        //  VALIDATE REFERRAL CODE
        // ============================================================
        async function validateReferralCode(code) {
            if (!code || code.length < 3) return;
            
            const refStatus = document.getElementById('refStatus');
            
            refStatus.className = 'ref-status checking';
            refStatus.textContent = '⏳ Checking...';
            
            try {
                const check = await checkReferralCode(code);
                if (check.valid && check.exists) {
                    refStatus.className = 'ref-status valid';
                    refStatus.textContent = `✅ Valid! Upline: ${check.email}`;
                    console.log(`✅ Referral code ${code} is valid!`);
                } else {
                    refStatus.className = 'ref-status invalid';
                    refStatus.textContent = '❌ Code not found';
                    console.log(`❌ Referral code ${code} not found`);
                }
            } catch (error) {
                refStatus.className = 'ref-status invalid';
                refStatus.textContent = '❌ Error checking';
                console.error('Validation error:', error);
            }
        }

        // ============================================================
        //  REAL-TIME REFERRAL CHECK (Manual input)
        // ============================================================
        const refInput = document.getElementById('registerRefCode');
        const refStatus = document.getElementById('refStatus');

        if (refInput) {
            refInput.addEventListener('input', function() {
                // Remove highlight when user manually edits
                const wrapper = document.getElementById('refInputWrapper');
                wrapper.classList.remove('highlight');
                
                // Update info banner
                const infoText = document.getElementById('refInfoText');
                if (infoText) {
                    infoText.innerHTML = 'Masukkan referral code dari upline Anda (opsional)';
                }
                
                clearTimeout(refCheckTimeout);
                const code = this.value.trim().toUpperCase();
                this.value = code;

                if (code === '') {
                    refStatus.className = 'ref-status';
                    refStatus.textContent = '';
                    return;
                }

                if (code.length < 3) {
                    refStatus.className = 'ref-status checking';
                    refStatus.textContent = '⏳ Type more...';
                    return;
                }

                refStatus.className = 'ref-status checking';
                refStatus.textContent = '⏳ Checking...';

                refCheckTimeout = setTimeout(async () => {
                    await validateReferralCode(code);
                }, 500);
            });
        }

        // ============================================================
        //  PASSWORD STRENGTH REAL-TIME
        // ============================================================
        const passwordInput = document.getElementById('registerPassword');
        const strengthEl = document.getElementById('passwordStrength');

        if (passwordInput) {
            passwordInput.addEventListener('input', function() {
                const strength = checkPasswordStrength(this.value);
                strengthEl.className = 'password-strength ' + strength.class;
                strengthEl.textContent = strength.label;
            });
        }

        // ============================================================
        //  TABS
        // ============================================================
        const tabs = document.querySelectorAll('.auth-tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                if (this.dataset.tab === 'login') {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                    hideResult('loginResult');
                    hideResult('registerResult');
                } else {
                    registerForm.classList.add('active');
                    loginForm.classList.remove('active');
                    hideResult('loginResult');
                    hideResult('registerResult');
                }
            });
        });

        // ============================================================
        //  LOGIN
        // ============================================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            hideResult('loginResult');

            if (!email || !password) {
                showResult('loginResult', 'Please fill in all fields.', 'error');
                return;
            }

            if (!email.includes('@')) {
                showResult('loginResult', 'Please enter a valid email address.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const user = await loginUser(email, password);
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({ email: user.email }));
                showResult('loginResult', '✅ Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    redirectUser(user);
                }, 800);

            } catch (err) {
                showResult('loginResult', '❌ ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        // ============================================================
        //  REGISTER
        // ============================================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const refCode = document.getElementById('registerRefCode').value.trim();

            hideResult('registerResult');

            if (!email || !password || !confirmPassword) {
                showResult('registerResult', 'Please fill in all fields.', 'error');
                return;
            }

            if (!email.includes('@')) {
                showResult('registerResult', 'Please enter a valid email address.', 'error');
                return;
            }

            if (password.length < MIN_PASSWORD_LENGTH) {
                showResult('registerResult', `Password must be at least ${MIN_PASSWORD_LENGTH} characters.`, 'error');
                return;
            }

            if (password !== confirmPassword) {
                showResult('registerResult', 'Passwords do not match. Please re-enter.', 'error');
                return;
            }

            if (refCode !== '') {
                const check = await checkReferralCode(refCode);
                if (!check.valid || !check.exists) {
                    showResult('registerResult', `❌ Invalid referral code: "${refCode}". Please check and try again.`, 'error');
                    return;
                }
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                const user = await createUser(email, password, refCode);
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({ email: user.email }));
                showResult('registerResult', '✅ Account created successfully! Redirecting...', 'success');

                setTimeout(() => {
                    redirectUser(user);
                }, 800);

            } catch (err) {
                showResult('registerResult', '❌ ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        document.getElementById('registerConfirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerBtn').click();
            }
        });

        // ============================================================
        //  CHECK ALREADY LOGGED IN
        // ============================================================
        async function checkAlreadyLoggedIn() {
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data && data.email) {
                        const user = await getUserByEmail(data.email);
                        if (user) {
                            console.log('👤 Already logged in as:', user.email);
                            redirectUser(user);
                            return true;
                        }
                    }
                }
                return false;
            } catch (e) {
                console.error('Check login error:', e);
                return false;
            }
        }

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            console.log('🔄 Auth page initializing...');

            if (!supabaseClient) {
                console.error('❌ Supabase not ready!');
                return;
            }

            const loggedIn = await checkAlreadyLoggedIn();
            if (loggedIn) return;

            // Auto-fill referral code from URL
            autoFillReferralCode();

            console.log('🟢 Auth page ready!');
        }

        // Run init when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        console.log('🟢 SilverChain Auth page ready.');
        console.log('📌 Supabase URL:', SUPABASE_URL);
    </script>

</body>
</html>
