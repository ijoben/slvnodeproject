<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilverChain · Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: rgba(18, 34, 72, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(100, 140, 220, 0.15);
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-logo i {
            font-size: 2.8rem;
            background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 0.3rem;
            background: rgba(8, 20, 48, 0.3);
            border-radius: 60px;
            padding: 0.3rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 60px;
            background: transparent;
            color: #888;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .auth-tab.active {
            background: rgba(192, 192, 192, 0.12);
            color: #e0e0e0;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .auth-tab:hover {
            color: #fff;
        }
        .auth-panel {
            display: none;
        }
        .auth-panel.active {
            display: block;
        }
        .auth-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 0.2rem;
        }
        .auth-sub {
            color: #a0a0a0;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
        }
        .input-field {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.1);
            background: rgba(8, 20, 48, 0.5);
            color: #d4d4d4;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 0.7rem;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: rgba(80, 140, 255, 0.3);
        }
        .input-field::placeholder {
            color: #666;
        }
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(145deg, #c0c0c0, #888);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.3rem;
        }
        .btn-primary:hover {
            box-shadow: 0 12px 40px -6px rgba(192, 192, 192, 0.2);
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .error-msg {
            color: #ff6a6a;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            color: #6aff8a;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .divider {
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            margin: 0.8rem 0;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(80, 140, 255, 0.08);
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }
        .forgot-link {
            text-align: right;
            margin: -0.2rem 0 0.8rem;
        }
        .forgot-link button {
            background: none;
            border: none;
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .forgot-link button:hover {
            color: #c0c0c0;
        }
        .toast-message {
            background: rgba(12, 28, 60, 0.9);
            backdrop-filter: blur(8px);
            border-left: 4px solid #c0c0c0;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }
        .toast-message.show {
            display: flex;
        }
        .toast-message i {
            color: #c0c0c0;
        }
        .reset-panel {
            display: none;
        }
        .reset-panel.active {
            display: block;
        }
        .clickable-link {
            background: none;
            border: none;
            color: #c0c0c0;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            padding: 0.2rem 0.4rem;
        }
        .clickable-link:hover {
            color: #fff;
        }
        .back-link {
            text-align: center;
            margin-top: 0.8rem;
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <div class="auth-logo">
            <i class="fas fa-coins"></i>
            <h1>SilverChain</h1>
        </div>

        <!-- Toast -->
        <div id="toastMessage" class="toast-message">
            <i class="fas fa-info-circle"></i> <span id="toastText">Info</span>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('panelLogin')"><i class="fas fa-sign-in-alt"></i> Login</button>
            <button class="auth-tab" onclick="switchTab('panelRegister')"><i class="fas fa-user-plus"></i> Register</button>
            <button class="auth-tab" onclick="switchTab('panelForgot')"><i class="fas fa-key"></i> Forgot</button>
        </div>

        <!-- LOGIN -->
        <div id="panelLogin" class="auth-panel active">
            <div class="auth-title">🔐 Login</div>
            <div class="auth-sub">Sign in to your account</div>
            <input type="email" class="input-field" id="loginEmail" placeholder="Email" />
            <input type="password" class="input-field" id="loginPassword" placeholder="Password" />
            <div class="forgot-link">
                <button class="clickable-link" onclick="switchTab('panelForgot')">Forgot password?</button>
            </div>
            <button class="btn-primary" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div id="loginError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="loginErrorText"></span></div>
            <div id="loginSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="loginSuccessText"></span></div>
            <div class="divider">or</div>
            <div style="text-align:center; color:#a0a0a0; font-size:0.8rem;">
                Don't have an account? <button class="clickable-link" onclick="switchTab('panelRegister')">Register Now</button>
            </div>
        </div>

        <!-- REGISTER -->
        <div id="panelRegister" class="auth-panel">
            <div class="auth-title">📝 Create Account</div>
            <div class="auth-sub">Join SilverChain community</div>
            <input type="email" class="input-field" id="regEmail" placeholder="Email" />
            <input type="password" class="input-field" id="regPassword" placeholder="Password (min 4)" />
            <input type="password" class="input-field" id="regPasswordConfirm" placeholder="Confirm Password" />
            <button class="btn-primary" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div id="regError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="regErrorText"></span></div>
            <div id="regSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="regSuccessText"></span></div>
            <div class="divider">or</div>
            <div style="text-align:center; color:#a0a0a0; font-size:0.8rem;">
                Already have an account? <button class="clickable-link" onclick="switchTab('panelLogin')">Login</button>
            </div>
        </div>

        <!-- FORGOT -->
        <div id="panelForgot" class="auth-panel">
            <div class="auth-title">🔑 Forgot Password</div>
            <div class="auth-sub">Enter your email to reset password</div>
            <input type="email" class="input-field" id="forgotEmail" placeholder="Email" />
            <button class="btn-primary" onclick="handleForgot()"><i class="fas fa-paper-plane"></i> Reset Password</button>
            <div id="forgotError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="forgotErrorText"></span></div>
            <div id="forgotSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="forgotSuccessText"></span></div>
            <div class="divider">or</div>
            <div style="text-align:center; color:#a0a0a0; font-size:0.8rem;">
                Remember your password? <button class="clickable-link" onclick="switchTab('panelLogin')">Login</button>
            </div>
        </div>

        <!-- RESET -->
        <div id="panelReset" class="reset-panel">
            <div class="auth-title">🔑 Reset Password</div>
            <div class="auth-sub">Enter your new password</div>
            <input type="hidden" id="resetEmail" />
            <input type="password" class="input-field" id="resetNewPassword" placeholder="New Password (min 4)" />
            <input type="password" class="input-field" id="resetConfirmPassword" placeholder="Confirm New Password" />
            <button class="btn-primary" onclick="handleReset()"><i class="fas fa-check"></i> Reset Password</button>
            <div id="resetError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="resetErrorText"></span></div>
            <div id="resetSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="resetSuccessText"></span></div>
            <div class="back-link">
                <button class="clickable-link" onclick="switchTab('panelLogin')"><i class="fas fa-arrow-left"></i> Back to Login</button>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 🔥 GANTI CREDENTIAL SUPABASE DI SINI 🔥
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_gSWYSM5dC7BQllHs9AkAGg_aX00RVRI'';

        // ============================================================
        // FUNGSI GLOBAL - Didefinisikan di ATAS sebelum error apapun
        // ============================================================

        // TAB SWITCH
        function switchTab(tabId) {
            console.log('Switching to:', tabId);
            
            // Update tabs
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.auth-tab');
            for (let t of tabs) {
                if (t.textContent.includes('Login') && tabId === 'panelLogin') t.classList.add('active');
                if (t.textContent.includes('Register') && tabId === 'panelRegister') t.classList.add('active');
                if (t.textContent.includes('Forgot') && tabId === 'panelForgot') t.classList.add('active');
            }

            // Update panels
            document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
            const panel = document.getElementById(tabId);
            if (panel) panel.classList.add('active');

            // Hide reset panel
            const resetPanel = document.getElementById('panelReset');
            resetPanel.classList.remove('active');
            resetPanel.style.display = 'none';
            document.getElementById('authTabs').style.display = 'flex';

            // Hide all messages
            document.querySelectorAll('.error-msg, .success-msg').forEach(el => el.classList.remove('show'));
        }

        // TOAST
        function showToast(msg) {
            const el = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3500);
        }

        // ============================================================
        // HANDLE LOGIN
        // ============================================================
        function handleLogin() {
            console.log('handleLogin called!');
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            const errorText = document.getElementById('loginErrorText');
            const successEl = document.getElementById('loginSuccess');
            const successText = document.getElementById('loginSuccessText');
            const btn = event ? event.target : document.activeElement;

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            // VALIDASI DULU SEBELUM PAKAI SUPABASE
            if (!email || !email.includes('@') || password.length < 4) {
                errorText.textContent = 'Invalid email or password.';
                errorEl.classList.add('show');
                return;
            }

            // SIMULASI LOGIN (karena Supabase mungkin error)
            // Ini hanya untuk test klik
            showToast('✅ Login clicked! (Supabase not connected yet)');
            
            // Kalo mau pake Supabase beneran, uncomment di bawah:
            /*
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            // Panggil Supabase di sini
            */
        }

        // ============================================================
        // HANDLE REGISTER
        // ============================================================
        function handleRegister() {
            console.log('handleRegister called!');
            
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regPasswordConfirm').value.trim();
            const errorEl = document.getElementById('regError');
            const errorText = document.getElementById('regErrorText');
            const successEl = document.getElementById('regSuccess');
            const successText = document.getElementById('regSuccessText');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!email || !email.includes('@')) {
                errorText.textContent = 'Please enter a valid email.';
                errorEl.classList.add('show');
                return;
            }
            if (password.length < 4) {
                errorText.textContent = 'Password must be at least 4 characters.';
                errorEl.classList.add('show');
                return;
            }
            if (password !== confirm) {
                errorText.textContent = 'Passwords do not match.';
                errorEl.classList.add('show');
                return;
            }

            showToast('✅ Register clicked! (Supabase not connected yet)');
        }

        // ============================================================
        // HANDLE FORGOT
        // ============================================================
        function handleForgot() {
            console.log('handleForgot called!');
            
            const email = document.getElementById('forgotEmail').value.trim();
            const errorEl = document.getElementById('forgotError');
            const errorText = document.getElementById('forgotErrorText');

            errorEl.classList.remove('show');

            if (!email || !email.includes('@')) {
                errorText.textContent = 'Please enter a valid email.';
                errorEl.classList.add('show');
                return;
            }

            showToast('🔑 Forgot password clicked!');
        }

        // ============================================================
        // HANDLE RESET
        // ============================================================
        function handleReset() {
            console.log('handleReset called!');
            
            const newPass = document.getElementById('resetNewPassword').value.trim();
            const confirm = document.getElementById('resetConfirmPassword').value.trim();
            const errorEl = document.getElementById('resetError');
            const errorText = document.getElementById('resetErrorText');
            const successEl = document.getElementById('resetSuccess');
            const successText = document.getElementById('resetSuccessText');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (newPass.length < 4) {
                errorText.textContent = 'Password must be at least 4 characters.';
                errorEl.classList.add('show');
                return;
            }
            if (newPass !== confirm) {
                errorText.textContent = 'Passwords do not match.';
                errorEl.classList.add('show');
                return;
            }

            showToast('✅ Reset password clicked!');
        }

        // ============================================================
        // CHECK TOKEN FROM URL
        // ============================================================
        function checkResetToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('reset');
            const email = urlParams.get('email');

            if (token && email) {
                document.getElementById('resetEmail').value = decodeURIComponent(email);
                document.getElementById('panelReset').style.display = 'block';
                document.getElementById('panelReset').classList.add('active');
                document.getElementById('authTabs').style.display = 'none';
                document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, '', window.location.pathname);
                }
                showToast('🔑 Enter your new password');
            }
        }

        // ============================================================
        // INIT SUPABASE (DENGAN TRY CATCH AGAR TIDAK ERROR)
        // ============================================================
        let supabase = null;
        try {
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase initialized');
            } else {
                console.warn('⚠️ Supabase SDK not loaded yet');
            }
        } catch (e) {
            console.error('❌ Supabase init error:', e);
            // JANGAN THROW ERROR - biarkan fungsi tetap jalan
        }

        // ============================================================
        // CHECK LOGGED IN
        // ============================================================
        function checkLoggedIn() {
            try {
                const saved = localStorage.getItem('silverchain_current_user');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.email) {
                        console.log('User already logged in:', data.email);
                        // Redirect jika perlu
                    }
                }
            } catch (e) {}
        }

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const active = document.querySelector('.auth-panel.active');
                if (active) {
                    const id = active.id;
                    if (id === 'panelLogin') handleLogin();
                    else if (id === 'panelRegister') handleRegister();
                    else if (id === 'panelForgot') handleForgot();
                }
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        checkLoggedIn();
        checkResetToken();

        console.log('🟢 SilverChain Auth ready!');
        console.log('📌 Supabase URL:', SUPABASE_URL);
        console.log('📌 Supabase status:', supabase ? '✅ Connected' : '⚠️ Not connected (functions still work)');
        console.log('📌 Klik tombol untuk test!');
    </script>

</body>
</html>
