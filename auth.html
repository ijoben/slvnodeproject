<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilverChain · Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: rgba(18, 34, 72, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 2.8rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(100, 140, 220, 0.15);
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-logo i {
            font-size: 2.8rem;
            background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0.2rem;
        }
        .auth-tabs {
            display: flex;
            gap: 0.3rem;
            background: rgba(8, 20, 48, 0.3);
            border-radius: 60px;
            padding: 0.3rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 60px;
            background: transparent;
            color: #888;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .auth-tab.active {
            background: rgba(192, 192, 192, 0.12);
            color: #e0e0e0;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .auth-tab:hover {
            color: #fff;
        }
        .auth-panel {
            display: none;
        }
        .auth-panel.active {
            display: block;
        }
        .auth-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e0e0e0;
            margin-bottom: 0.2rem;
        }
        .auth-sub {
            color: #a0a0a0;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
        }
        .input-field {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.1);
            background: rgba(8, 20, 48, 0.5);
            color: #d4d4d4;
            font-size: 0.95rem;
            outline: none;
            margin-bottom: 0.7rem;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: rgba(80, 140, 255, 0.3);
        }
        .input-field::placeholder {
            color: #666;
        }
        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            border-radius: 60px;
            border: none;
            background: linear-gradient(145deg, #c0c0c0, #888);
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 0.3rem;
        }
        .btn-primary:hover {
            box-shadow: 0 12px 40px -6px rgba(192, 192, 192, 0.2);
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .error-msg {
            color: #ff6a6a;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            color: #6aff8a;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .divider {
            text-align: center;
            color: #666;
            font-size: 0.75rem;
            margin: 0.8rem 0;
            position: relative;
        }
        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(80, 140, 255, 0.08);
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }
        .forgot-link {
            text-align: right;
            margin: -0.2rem 0 0.8rem;
        }
        .forgot-link button {
            background: none;
            border: none;
            color: #888;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .forgot-link button:hover {
            color: #c0c0c0;
        }
        .toast-message {
            background: rgba(12, 28, 60, 0.9);
            backdrop-filter: blur(8px);
            border-left: 4px solid #c0c0c0;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }
        .toast-message.show {
            display: flex;
        }
        .toast-message i {
            color: #c0c0c0;
        }
        .reset-panel {
            display: none;
        }
        .reset-panel.active {
            display: block;
        }
        .clickable-link {
            background: none;
            border: none;
            color: #c0c0c0;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            padding: 0.2rem 0.4rem;
        }
        .clickable-link:hover {
            color: #fff;
        }
        .back-link {
            text-align: center;
            margin-top: 0.8rem;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .referral-field {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            margin-bottom: 0.7rem;
            font-size: 0.85rem;
            color: #a0a0a0;
            border: 1px solid rgba(80, 140, 255, 0.1);
        }
        .referral-field i {
            margin-right: 0.5rem;
        }
        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <div class="auth-logo">
            <i class="fas fa-coins"></i>
            <h1>SilverChain</h1>
        </div>

        <div id="toastMessage" class="toast-message">
            <i class="fas fa-info-circle"></i> <span id="toastText">Info</span>
        </div>

        <!-- TABS -->
        <div class="auth-tabs" id="authTabs">
            <button class="auth-tab active" onclick="switchTab('panelLogin')"><i class="fas fa-sign-in-alt"></i> Login</button>
            <button class="auth-tab" onclick="switchTab('panelRegister')"><i class="fas fa-user-plus"></i> Register</button>
            <button class="auth-tab" onclick="switchTab('panelForgot')"><i class="fas fa-key"></i> Forgot</button>
        </div>

        <!-- LOGIN -->
        <div id="panelLogin" class="auth-panel active">
            <div class="auth-title">🔐 Login</div>
            <div class="auth-sub">Sign in to your account</div>
            <input type="email" class="input-field" id="loginEmail" placeholder="Email" />
            <input type="password" class="input-field" id="loginPassword" placeholder="Password" />
            <div class="forgot-link">
                <button class="clickable-link" onclick="switchTab('panelForgot')">Forgot password?</button>
            </div>
            <button class="btn-primary" id="loginBtn" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div id="loginError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="loginErrorText"></span></div>
            <div id="loginSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="loginSuccessText"></span></div>
            <div class="divider">or</div>
            <div style="text-align:center; color:#a0a0a0; font-size:0.8rem;">
                Don't have an account? <button class="clickable-link" onclick="switchTab('panelRegister')">Register Now</button>
            </div>
        </div>

        <!-- REGISTER -->
        <div id="panelRegister" class="auth-panel">
            <div class="auth-title">📝 Create Account</div>
            <div class="auth-sub">Join SilverChain community</div>
            
            <!-- Referral Field -->
            <div class="referral-field" id="referralField">
                <i class="fas fa-link"></i> Referral: <span id="referralDisplay">None</span>
            </div>
            <input type="hidden" id="refCode" value="" />
            
            <input type="email" class="input-field" id="regEmail" placeholder="Email" />
            <input type="password" class="input-field" id="regPassword" placeholder="Password (min 6)" />
            <input type="password" class="input-field" id="regPasswordConfirm" placeholder="Confirm Password" />
            <button class="btn-primary" id="registerBtn" onclick="handleRegister()"><i class="fas fa-user-plus"></i> Register</button>
            <div id="regError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="regErrorText"></span></div>
            <div id="regSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="regSuccessText"></span></div>
            <div class="divider">or</div>
            <div style="text-align:center; color:#a0a0a0; font-size:0.8rem;">
                Already have an account? <button class="clickable-link" onclick="switchTab('panelLogin')">Login</button>
            </div>
        </div>

        <!-- FORGOT -->
        <div id="panelForgot" class="auth-panel">
            <div class="auth-title">🔑 Forgot Password</div>
            <div class="auth-sub">Enter your email to reset password</div>
            <input type="email" class="input-field" id="forgotEmail" placeholder="Email" />
            <button class="btn-primary" id="forgotBtn" onclick="handleForgot()"><i class="fas fa-paper-plane"></i> Reset Password</button>
            <div id="forgotError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="forgotErrorText"></span></div>
            <div id="forgotSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="forgotSuccessText"></span></div>
            <div class="divider">or</div>
            <div style="text-align:center; color:#a0a0a0; font-size:0.8rem;">
                Remember your password? <button class="clickable-link" onclick="switchTab('panelLogin')">Login</button>
            </div>
        </div>

        <!-- RESET -->
        <div id="panelReset" class="reset-panel">
            <div class="auth-title">🔑 Reset Password</div>
            <div class="auth-sub">Enter your new password</div>
            <input type="hidden" id="resetEmail" />
            <input type="password" class="input-field" id="resetNewPassword" placeholder="New Password (min 6)" />
            <input type="password" class="input-field" id="resetConfirmPassword" placeholder="Confirm New Password" />
            <button class="btn-primary" id="resetBtn" onclick="handleReset()"><i class="fas fa-check"></i> Reset Password</button>
            <div id="resetError" class="error-msg"><i class="fas fa-exclamation-circle"></i> <span id="resetErrorText"></span></div>
            <div id="resetSuccess" class="success-msg"><i class="fas fa-check-circle"></i> <span id="resetSuccessText"></span></div>
            <div class="back-link">
                <button class="clickable-link" onclick="switchTab('panelLogin')"><i class="fas fa-arrow-left"></i> Back to Login</button>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // 🔥 SUPABASE CREDENTIALS
        // ============================================================
        var SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyYnJpYXNnbXhqenZidWtzbGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzAxODMsImV4cCI6MjA5OTYwNjE4M30.fhcSgXY-D-AvgDyg86v7eA_ltAU_UC0LFrCDnsJufgg';

        // ============================================================
        // GLOBAL VARIABLES
        // ============================================================
        var supabase = null;
        var resetTokens = {};
        var currentReferral = null;

        // ============================================================
        // INIT SUPABASE
        // ============================================================
        try {
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Supabase initialized');
            } else {
                console.error('❌ Supabase SDK not loaded!');
                showToast('❌ Supabase SDK failed to load');
            }
        } catch (e) {
            console.error('❌ Supabase init error:', e.message);
            showToast('❌ Supabase initialization failed');
        }

        // ============================================================
        // CHECK REFERRAL FROM URL
        // ============================================================
        function checkReferral() {
            var params = new URLSearchParams(window.location.search);
            var ref = params.get('ref');
            
            if (ref && ref.length > 0) {
                currentReferral = ref;
                document.getElementById('refCode').value = ref;
                document.getElementById('referralDisplay').textContent = ref;
                document.getElementById('referralField').style.display = 'block';
                showToast('📎 Referral code: ' + ref);
                console.log('📎 Referral detected:', ref);
            } else {
                document.getElementById('referralField').style.display = 'none';
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(msg) {
            var el = document.getElementById('toastMessage');
            document.getElementById('toastText').textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 3500);
        }

        // ============================================================
        // TAB SWITCH
        // ============================================================
        function switchTab(tabId) {
            console.log('Switching to:', tabId);
            
            var tabs = document.querySelectorAll('.auth-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            
            var panels = document.querySelectorAll('.auth-panel');
            for (var i = 0; i < panels.length; i++) {
                panels[i].classList.remove('active');
            }
            
            var panel = document.getElementById(tabId);
            if (panel) panel.classList.add('active');

            var resetPanel = document.getElementById('panelReset');
            resetPanel.classList.remove('active');
            resetPanel.style.display = 'none';
            document.getElementById('authTabs').style.display = 'flex';

            var msgs = document.querySelectorAll('.error-msg, .success-msg');
            for (var i = 0; i < msgs.length; i++) {
                msgs[i].classList.remove('show');
            }
        }

        // ============================================================
        // VALIDATE REFERRAL
        // ============================================================
        async function validateReferral(refCode) {
            if (!supabase) throw new Error('Supabase not connected');
            
            try {
                var result = await supabase
                    .from('users')
                    .select('id, email')
                    .eq('referral_code', refCode)
                    .single();
                
                if (result.error) {
                    console.log('Referral validation error:', result.error);
                    return null;
                }
                
                return result.data;
            } catch (e) {
                console.error('Error validating referral:', e);
                return null;
            }
        }

        // ============================================================
        // GENERATE REFERRAL CODE
        // ============================================================
        function generateReferralCode(email) {
            var prefix = email.split('@')[0].substring(0, 4).toUpperCase();
            var random = Math.random().toString(36).substring(2, 6).toUpperCase();
            return prefix + random;
        }

        // ============================================================
        // SUPABASE FUNCTIONS
        // ============================================================
        async function loginUser(email, password) {
            if (!supabase) throw new Error('Supabase not connected');
            var result = await supabase.auth.signInWithPassword({ 
                email: email, 
                password: password 
            });
            if (result.error) throw result.error;
            return result.data.user;
        }

        async function registerUser(email, password, referralCode) {
            if (!supabase) throw new Error('Supabase not connected');
            
            // Generate referral code for new user
            var newRefCode = generateReferralCode(email);
            
            // Validate referral if exists
            var referrerId = null;
            if (referralCode && referralCode.length > 0) {
                var referrer = await validateReferral(referralCode);
                if (referrer) {
                    referrerId = referrer.id;
                    console.log('✅ Valid referral from:', referrer.email);
                } else {
                    console.log('⚠️ Invalid referral code, ignoring');
                }
            }
            
            // Register user
            var result = await supabase.auth.signUp({ 
                email: email, 
                password: password,
                options: {
                    data: {
                        referral_code: newRefCode,
                        referred_by: referrerId || null
                    }
                }
            });
            
            if (result.error) throw result.error;
            
            if (result.data.user) {
                // Insert user profile
                var userData = {
                    id: result.data.user.id,
                    email: email,
                    referral_code: newRefCode,
                    referred_by: referrerId || null,
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                
                try {
                    var insertResult = await supabase
                        .from('users')
                        .insert([userData]);
                    
                    if (insertResult.error) {
                        console.error('User insert error:', insertResult.error);
                    } else {
                        console.log('✅ User profile created with referral:', newRefCode);
                    }
                    
                    // If there's a referrer, update their referral count
                    if (referrerId) {
                        try {
                            var referrerResult = await supabase
                                .rpc('increment_referral_count', {
                                    user_id: referrerId
                                });
                            console.log('✅ Referral count updated:', referrerResult);
                        } catch (e) {
                            console.warn('⚠️ Referral count update failed:', e);
                        }
                    }
                    
                } catch (e) {
                    console.warn('⚠️ Profile creation warning:', e);
                }
            }
            
            return result.data.user;
        }

        // ============================================================
        // HANDLE LOGIN
        // ============================================================
        function handleLogin() {
            console.log('🔐 Login button clicked!');
            
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value.trim();
            var errorEl = document.getElementById('loginError');
            var errorText = document.getElementById('loginErrorText');
            var successEl = document.getElementById('loginSuccess');
            var successText = document.getElementById('loginSuccessText');
            var btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!email || !email.includes('@')) {
                errorText.textContent = 'Please enter a valid email.';
                errorEl.classList.add('show');
                return;
            }
            if (password.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters.';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Logging in...';

            loginUser(email, password)
                .then(function(user) {
                    localStorage.setItem('silverchain_user', JSON.stringify({ 
                        email: user.email,
                        id: user.id
                    }));
                    successText.textContent = '✅ Login successful!';
                    successEl.classList.add('show');
                    showToast('✅ Login successful!');
                    setTimeout(function() {
                        window.location.href = '/dashboard';
                    }, 1500);
                })
                .catch(function(err) {
                    errorText.textContent = err.message || 'Login failed. Please check your credentials.';
                    errorEl.classList.add('show');
                    showToast('❌ ' + (err.message || 'Login failed'));
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                });
        }

        // ============================================================
        // HANDLE REGISTER
        // ============================================================
        function handleRegister() {
            console.log('📝 Register button clicked!');
            
            var email = document.getElementById('regEmail').value.trim();
            var password = document.getElementById('regPassword').value.trim();
            var confirm = document.getElementById('regPasswordConfirm').value.trim();
            var referralCode = document.getElementById('refCode').value.trim();
            var errorEl = document.getElementById('regError');
            var errorText = document.getElementById('regErrorText');
            var successEl = document.getElementById('regSuccess');
            var successText = document.getElementById('regSuccessText');
            var btn = document.getElementById('registerBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!email || !email.includes('@')) {
                errorText.textContent = 'Please enter a valid email.';
                errorEl.classList.add('show');
                return;
            }
            if (password.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters.';
                errorEl.classList.add('show');
                return;
            }
            if (password !== confirm) {
                errorText.textContent = 'Passwords do not match.';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Registering...';

            registerUser(email, password, referralCode)
                .then(function() {
                    successText.textContent = '✅ Account created successfully! Please login.';
                    successEl.classList.add('show');
                    showToast('✅ Account created successfully!');
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regPasswordConfirm').value = '';
                    setTimeout(function() {
                        switchTab('panelLogin');
                        document.getElementById('loginEmail').value = email;
                        showToast('✅ Please login with your new account');
                    }, 1500);
                })
                .catch(function(err) {
                    errorText.textContent = err.message || 'Registration failed. Please try again.';
                    errorEl.classList.add('show');
                    showToast('❌ ' + (err.message || 'Registration failed'));
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Register';
                });
        }

        // ============================================================
        // HANDLE FORGOT
        // ============================================================
        function handleForgot() {
            console.log('🔑 Forgot password clicked!');
            
            var email = document.getElementById('forgotEmail').value.trim();
            var errorEl = document.getElementById('forgotError');
            var errorText = document.getElementById('forgotErrorText');
            var successEl = document.getElementById('forgotSuccess');
            var successText = document.getElementById('forgotSuccessText');
            var btn = document.getElementById('forgotBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (!email || !email.includes('@')) {
                errorText.textContent = 'Please enter a valid email.';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...';

            // Send password reset email via Supabase
            if (supabase) {
                supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/auth.html'
                })
                .then(function(result) {
                    if (result.error) throw result.error;
                    
                    successText.textContent = '✅ Password reset email sent! Check your inbox.';
                    successEl.classList.add('show');
                    showToast('📧 Password reset email sent!');
                    document.getElementById('forgotEmail').value = '';
                })
                .catch(function(err) {
                    errorText.textContent = err.message || 'Failed to send reset email.';
                    errorEl.classList.add('show');
                    showToast('❌ ' + (err.message || 'Failed to send reset email'));
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Reset Password';
                });
            } else {
                showToast('❌ Supabase not connected');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Reset Password';
            }
        }

        // ============================================================
        // HANDLE RESET
        // ============================================================
        function handleReset() {
            console.log('🔄 Reset password clicked!');
            
            var newPass = document.getElementById('resetNewPassword').value.trim();
            var confirm = document.getElementById('resetConfirmPassword').value.trim();
            var errorEl = document.getElementById('resetError');
            var errorText = document.getElementById('resetErrorText');
            var successEl = document.getElementById('resetSuccess');
            var successText = document.getElementById('resetSuccessText');
            var btn = document.getElementById('resetBtn');

            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (newPass.length < 6) {
                errorText.textContent = 'Password must be at least 6 characters.';
                errorEl.classList.add('show');
                return;
            }
            if (newPass !== confirm) {
                errorText.textContent = 'Passwords do not match.';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Updating...';

            // Update password via Supabase
            if (supabase) {
                supabase.auth.updateUser({
                    password: newPass
                })
                .then(function(result) {
                    if (result.error) throw result.error;
                    
                    successText.textContent = '✅ Password updated successfully!';
                    successEl.classList.add('show');
                    showToast('✅ Password updated!');
                    
                    setTimeout(function() {
                        document.getElementById('panelReset').classList.remove('active');
                        document.getElementById('panelReset').style.display = 'none';
                        document.getElementById('authTabs').style.display = 'flex';
                        switchTab('panelLogin');
                        showToast('✅ Please login with your new password');
                    }, 1500);
                })
                .catch(function(err) {
                    errorText.textContent = err.message || 'Failed to update password.';
                    errorEl.classList.add('show');
                    showToast('❌ ' + (err.message || 'Failed to update password'));
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
                });
            } else {
                showToast('❌ Supabase not connected');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> Reset Password';
            }
        }

        // ============================================================
        // CHECK LOGGED IN
        // ============================================================
        function checkLoggedIn() {
            try {
                var saved = localStorage.getItem('silverchain_user');
                if (saved) {
                    var data = JSON.parse(saved);
                    if (data.email) {
                        console.log('User already logged in:', data.email);
                    }
                }
            } catch (e) {}
        }

        // ============================================================
        // LOAD RESET TOKENS
        // ============================================================
        try {
            var tokens = localStorage.getItem('silverchain_reset_tokens');
            if (tokens) resetTokens = JSON.parse(tokens);
        } catch (e) {}

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var active = document.querySelector('.auth-panel.active');
                if (active) {
                    var id = active.id;
                    if (id === 'panelLogin') handleLogin();
                    else if (id === 'panelRegister') handleRegister();
                    else if (id === 'panelForgot') handleForgot();
                }
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        checkReferral();
        checkLoggedIn();
        console.log('🟢 SilverChain Auth ready!');
        console.log('📌 Supabase status:', supabase ? '✅ Connected' : '❌ Not connected');
    </script>

</body>
</html>
