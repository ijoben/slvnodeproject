<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>SilverChain · Auth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1228;
            background-image: radial-gradient(ellipse at 30% 20%, #1a2a5a, #060c1a);
            color: #d4d4d4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem 1rem;
        }
        .auth-container {
            max-width: 440px;
            width: 100%;
        }
        .auth-card {
            background: rgba(18, 34, 72, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.8rem;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(100, 140, 220, 0.15);
            border: 1px solid rgba(80, 140, 255, 0.08);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .auth-logo .logo-icon {
            font-size: 4rem;
            background: linear-gradient(145deg, #e8e8e8, #c0c0c0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }
        .auth-logo h1 {
            color: #e0e0e0;
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 0.2rem;
        }
        .auth-logo p {
            color: #a0a0a0;
            font-size: 0.85rem;
        }

        .auth-tabs {
            display: flex;
            gap: 0.3rem;
            background: rgba(8, 20, 48, 0.4);
            border-radius: 60px;
            padding: 0.25rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(80, 140, 255, 0.06);
        }
        .auth-tab {
            flex: 1;
            padding: 0.6rem 0.5rem;
            border: none;
            border-radius: 60px;
            background: transparent;
            color: #a0a0a0;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
        }
        .auth-tab.active {
            background: rgba(60, 120, 255, 0.12);
            color: #e0e0e0;
            box-shadow: inset 0 0 20px rgba(60, 120, 255, 0.05);
        }
        .auth-tab:hover:not(.active) {
            color: #c0c0c0;
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .auth-form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 0.3rem;
        }
        .form-group .input-wrap {
            display: flex;
            align-items: center;
            background: rgba(8, 20, 48, 0.5);
            border-radius: 60px;
            border: 1px solid rgba(80, 140, 255, 0.06);
            padding: 0.1rem 0.1rem 0.1rem 1.2rem;
            transition: border-color 0.2s;
        }
        .form-group .input-wrap:focus-within {
            border-color: rgba(80, 140, 255, 0.2);
        }
        .form-group .input-wrap i {
            color: #666666;
            font-size: 1rem;
            margin-right: 0.6rem;
            flex-shrink: 0;
        }
        .form-group .input-wrap input {
            background: transparent;
            border: none;
            padding: 0.75rem 0;
            font-size: 0.95rem;
            color: #d4d4d4;
            width: 100%;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group .input-wrap input::placeholder {
            color: #555555;
            font-weight: 400;
        }
        .form-group .input-wrap .toggle-pw {
            background: none;
            border: none;
            color: #666666;
            padding: 0 1rem;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .form-group .input-wrap .toggle-pw:hover {
            color: #a0a0a0;
        }

        .form-group .ref-input {
            background: rgba(8, 20, 48, 0.3);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            color: #a0a0a0;
            border: 1px solid rgba(80, 140, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-group .ref-input i {
            color: #666666;
        }
        .form-group .ref-input code {
            color: #c0c0c0;
            background: rgba(8, 20, 48, 0.3);
            padding: 0.1rem 0.6rem;
            border-radius: 60px;
            font-size: 0.75rem;
        }

        .btn-submit {
            background: linear-gradient(145deg, #c0c0c0, #888888);
            border: none;
            border-radius: 60px;
            padding: 0.85rem;
            font-weight: 700;
            font-size: 1rem;
            color: #0a1228;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.3rem;
            box-shadow: 0 8px 30px -6px rgba(192, 192, 192, 0.1);
        }
        .btn-submit:hover {
            box-shadow: 0 12px 40px -6px rgba(192, 192, 192, 0.2);
            transform: translateY(-2px);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-back {
            background: rgba(60, 120, 255, 0.06);
            border: 1px solid rgba(80, 140, 255, 0.06);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            color: #a0a0a0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
            border: none;
            margin-top: 0.5rem;
        }
        .btn-back:hover {
            background: rgba(60, 120, 255, 0.12);
            color: #c0c0c0;
        }

        .result-msg {
            display: none;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.3rem;
        }
        .result-msg.success {
            display: block;
            background: rgba(60, 220, 80, 0.08);
            border: 1px solid rgba(60, 220, 80, 0.12);
            color: #6aff8a;
        }
        .result-msg.error {
            display: block;
            background: rgba(255, 60, 60, 0.08);
            border: 1px solid rgba(255, 60, 60, 0.12);
            color: #ff6a6a;
        }
        .result-msg.info {
            display: block;
            background: rgba(60, 120, 255, 0.08);
            border: 1px solid rgba(60, 120, 255, 0.12);
            color: #60a5fa;
        }
        .result-msg i {
            margin-right: 6px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(80, 140, 255, 0.05);
            color: #888888;
            font-size: 0.7rem;
        }
        .auth-footer a {
            color: #a0a0a0;
            text-decoration: none;
        }
        .auth-footer a:hover {
            color: #c0c0c0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.8rem 1.2rem 1.5rem;
                border-radius: 2rem;
            }
            .auth-logo .logo-icon {
                font-size: 3rem;
            }
            .auth-logo h1 {
                font-size: 1.3rem;
            }
            .auth-tab {
                font-size: 0.8rem;
                padding: 0.5rem 0.3rem;
            }
            .form-group .input-wrap input {
                font-size: 0.85rem;
                padding: 0.6rem 0;
            }
            .form-group .input-wrap {
                padding-left: 0.8rem;
            }
            .btn-submit {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
        }

        @media (max-width: 360px) {
            .auth-card {
                padding: 1.2rem 0.8rem 1rem;
                border-radius: 1.5rem;
            }
            .auth-tab {
                font-size: 0.7rem;
                padding: 0.4rem 0.2rem;
            }
            .form-group .input-wrap input {
                font-size: 0.8rem;
                padding: 0.5rem 0;
            }
            .form-group .input-wrap {
                padding-left: 0.6rem;
            }
            .form-group .input-wrap i {
                font-size: 0.8rem;
                margin-right: 0.4rem;
            }
            .btn-submit {
                font-size: 0.8rem;
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-logo">
                <span class="logo-icon"><i class="fas fa-coins"></i></span>
                <h1>SilverChain</h1>
                <p>DAO Prelaunch</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form class="auth-form active" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required />
                        <button type="button" class="toggle-pw" onclick="togglePassword('loginPassword', this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
                <div class="result-msg" id="loginResult"></div>
                <button type="button" class="btn-back" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</button>
            </form>

            <!-- ===== REGISTER FORM ===== -->
            <form class="auth-form" id="registerForm" autocomplete="off">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="registerEmail" placeholder="you@example.com" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="registerPassword" placeholder="Min 4 characters" required minlength="4" />
                        <button type="button" class="toggle-pw" onclick="togglePassword('registerPassword', this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Referral Code (optional)</label>
                    <div class="ref-input">
                        <i class="fas fa-link"></i>
                        <span>Enter referral code:</span>
                        <input type="text" id="registerRefCode" placeholder="e.g. ABC123" style="background:transparent;border:none;color:#d4d4d4;padding:0.2rem 0.4rem;outline:none;font-size:0.85rem;flex:1;min-width:80px;font-family:monospace;" />
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="registerBtn"><i class="fas fa-user-plus"></i> Create Account</button>
                <div class="result-msg" id="registerResult"></div>
                <button type="button" class="btn-back" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Back to Home</button>
            </form>

            <div class="auth-footer">
                <span>SilverChain DAO &copy; 2026</span>
            </div>

        </div>

    </div>

    <script>
        // ============================================================
        //  SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://xrbriasgmxjzvbukslat.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyYnJpYXNnbXhqenZidWtzbGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzAxODMsImV4cCI6MjA5OTYwNjE4M30.fhcSgXY-D-AvgDyg86v7eA_ltAU_UC0LFrCDnsJufgg';
        const STORAGE_KEYS = { CURRENT_USER: 'silverchain_current_user' };
        const ADMIN_EMAIL = 'admin@silverchain.io';

        let supabaseClient = null;

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Supabase client created!');
        } catch (err) {
            console.error('❌ Supabase error:', err);
        }

        // ============================================================
        //  HELPERS
        // ============================================================
        function generateRefCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function hashPassword(password) {
            return btoa(password + 'silverchain_salt_2026');
        }

        function showResult(id, msg, type = 'info') {
            const el = document.getElementById(id);
            el.className = 'result-msg ' + type;
            el.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
            el.style.display = 'block';
        }

        function hideResult(id) {
            const el = document.getElementById(id);
            el.className = 'result-msg';
            el.style.display = 'none';
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ============================================================
        //  SUPABASE FUNCTIONS
        // ============================================================
        async function getUserByEmail(email) {
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();
                if (error && error.code === 'PGRST116') return null;
                if (error) throw error;
                return data;
            } catch (error) {
                console.error('Get user error:', error);
                return null;
            }
        }

        async function createUser(email, password, refCode = null) {
            try {
                const existing = await getUserByEmail(email);
                if (existing) {
                    throw new Error('Email already registered. Please login.');
                }

                const newRefCode = generateRefCode();
                const hashedPassword = hashPassword(password);

                // Verify referral code exists if provided
                let referredBy = null;
                if (refCode && refCode.trim() !== '') {
                    const referrer = await supabaseClient
                        .from('users')
                        .select('ref_code')
                        .eq('ref_code', refCode.trim().toUpperCase())
                        .maybeSingle();

                    if (referrer.data) {
                        referredBy = referrer.data.ref_code;
                    } else {
                        throw new Error('Invalid referral code. Please check and try again.');
                    }
                }

                const { data, error } = await supabaseClient
                    .from('users')
                    .insert({
                        email: email,
                        password: hashedPassword,
                        ref_code: newRefCode,
                        referred_by: referredBy,
                        verified: false,
                        role: email === ADMIN_EMAIL ? 'admin' : 'member',
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (error) {
                    if (error.code === '23505') {
                        throw new Error('Email already registered. Please login.');
                    }
                    throw error;
                }

                return data;
            } catch (error) {
                console.error('Create user error:', error);
                throw error;
            }
        }

        async function loginUser(email, password) {
            try {
                const user = await getUserByEmail(email);
                if (!user) {
                    throw new Error('Account not found. Please register first.');
                }

                const hashed = hashPassword(password);
                if (user.password !== hashed) {
                    throw new Error('Invalid password. Please try again.');
                }

                return user;
            } catch (error) {
                console.error('Login error:', error);
                throw error;
            }
        }

        // ============================================================
        //  TABS
        // ============================================================
        const tabs = document.querySelectorAll('.auth-tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');

        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                if (this.dataset.tab === 'login') {
                    loginForm.classList.add('active');
                    registerForm.classList.remove('active');
                    hideResult('loginResult');
                    hideResult('registerResult');
                } else {
                    registerForm.classList.add('active');
                    loginForm.classList.remove('active');
                    hideResult('loginResult');
                    hideResult('registerResult');
                }
            });
        });

        // ============================================================
        //  HANDLE REFERRAL CODE FROM URL
        // ============================================================
        function handleReferralFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if (ref) {
                document.getElementById('registerRefCode').value = ref.toUpperCase();
                // Switch to register tab
                document.querySelector('.auth-tab[data-tab="register"]').click();
            }
        }

        // ============================================================
        //  LOGIN
        // ============================================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            hideResult('loginResult');

            if (!email || !password) {
                showResult('loginResult', 'Please fill in all fields.', 'error');
                return;
            }

            if (!email.includes('@')) {
                showResult('loginResult', 'Please enter a valid email address.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const user = await loginUser(email, password);
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({ email: user.email }));
                showResult('loginResult', '✅ Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 800);

            } catch (err) {
                showResult('loginResult', '❌ ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        // ============================================================
        //  REGISTER
        // ============================================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const refCode = document.getElementById('registerRefCode').value.trim();

            hideResult('registerResult');

            if (!email || !password) {
                showResult('registerResult', 'Please fill in all fields.', 'error');
                return;
            }

            if (!email.includes('@')) {
                showResult('registerResult', 'Please enter a valid email address.', 'error');
                return;
            }

            if (password.length < 4) {
                showResult('registerResult', 'Password must be at least 4 characters.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                const user = await createUser(email, password, refCode);
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({ email: user.email }));
                showResult('registerResult', '✅ Account created successfully! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 800);

            } catch (err) {
                showResult('registerResult', '❌ ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        });

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });

        document.getElementById('registerPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('registerBtn').click();
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        function init() {
            console.log('🔄 Auth page initializing...');

            if (!supabaseClient) {
                console.error('❌ Supabase not ready!');
                // Still allow form submission, but will fail gracefully
            }

            // Check if already logged in
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data && data.email) {
                        // Already logged in, redirect to dashboard
                        console.log('👤 Already logged in as:', data.email);
                        window.location.href = '/dashboard';
                        return;
                    }
                }
            } catch (e) {
                console.error('Check login error:', e);
            }

            handleReferralFromURL();
            console.log('🟢 Auth page ready!');
        }

        init();
        console.log('🟢 SilverChain Auth page ready.');
        console.log('📌 Supabase URL:', SUPABASE_URL);
    </script>

</body>
</html>
